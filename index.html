<head>

  <title>Sistema IMAC - Fichas Técnicas</title>

  <script type="importmap">
    {
      "imports": {

        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    
    body { font-family: 'Inter', sans-serif; }

      .page-break { page-break-before: always !important; break-before: page !important; }
      .avoid-break { break-inside: avoid !important; page-break-inside: avoid !important; }

    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
    .toast-enter { animation: slideIn 0.3s ease-out forwards; }
    .toast-exit { animation: slideOut 0.3s ease-in forwards; }
  </style>
</head>
<body class="bg-slate-50 text-gray-800 font-sans">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import * as Lucide from 'https://esm.sh/lucide-react@0.292.0';
    
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    const {
      LayoutDashboard, FileText, Plus, Search, Filter, Settings,
      Edit, Printer, CheckCircle, Info, Database, Upload, Trash2, ArrowLeft,
      Building, MapPin, Phone, Mail, X, Image: ImageIcon, Save, Calculator, Package,
      Copy, GripVertical, AlertTriangle, HelpCircle, Download, ChevronUp, ChevronDown, SaveAll, Check, Clock, Zap, Activity
    } = Lucide;

    // ============================================================================
    // 1. CONFIGURAÇÃO E DADOS
    // ============================================================================
    const firebaseConfig = {
      apiKey: "AIzaSyClLwKGarEcm6g467w-Esi7d7CEgL36mH0", 
      authDomain: "fichas-fd833.firebaseapp.com",
      projectId: "fichas-fd833",
      storageBucket: "fichas-fd833.firebasestorage.app",
      messagingSenderId: "809866493261",
      appId: "1:809866493261:web:cdddabb0039736e4c64b04"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const emptyFicha = {
      id: '', code: '', name: '', category: '', version: 1, status: 'draft', coverImage: '', general: { brand: 'IMAC', description: '' },
      technical: { unitsPerPackage: 0, packageWeight: '', unitWeight: '', perTray: 0, ovens: [] },
      ingredients: { text: '', containsGluten: false, containsLactose: false, allergensText: '' },
      conservation: { frozen: '', refrigerated: '', ambient: '', openPackage: '', closedPackage: '' },
      validity: { package: '', postBaking: '', postDefrost: '' },
      preparationSteps: [], formulation: [], 
      nutritional: { finalYield: '', portionsPerPackage: 100, portion: 0, measure: '', kcal: 0, carbs: 0, totalSugars: 0, addedSugars: 0, proteins: 0, totalFats: 0, satFats: 0, transFats: 0, fiber: 0, sodium: 0 },
      approval: { show: false, createdBy: '', reviewedBy: '', approvedBy: '' }, revisionHistory: []
    };

    const mockFichas = [];
    const mockIngredients = [];
    const round2 = (num) => Math.round((num + Number.EPSILON) * 100) / 100;

    // COMPRESSOR DE IMAGENS (Evita erro de 1MB do Firestore e mantém transparência via WebP)
    const compressImageToWebP = (file, callback) => {
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const MAX_WIDTH = 800;
          const MAX_HEIGHT = 800;
          let width = img.width;
          let height = img.height;

          if (width > height) {
            if (width > MAX_WIDTH) { height = Math.round(height * (MAX_WIDTH / width)); width = MAX_WIDTH; }
          } else {
            if (height > MAX_HEIGHT) { width = Math.round(width * (MAX_HEIGHT / height)); height = MAX_HEIGHT; }
          }
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          
          // Converte para WebP com 75% de qualidade (Leve e suporta transparência)
          callback(canvas.toDataURL('image/webp', 0.75));
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    };

    // ============================================================================
    // 2. SISTEMA PRINCIPAL (App)
    // ============================================================================
    function App() {
      const [user, setUser] = useState(null);
      const [loadingAuth, setLoadingAuth] = useState(true);
      const [currentView, setCurrentView] = useState('dashboard');
      const [fichas, setFichas] = useState([]);
      const [customIngredients, setCustomIngredients] = useState([]);
      const [selectedFicha, setSelectedFicha] = useState(null);
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [isFallbackMode, setIsFallbackMode] = useState(false);

      const [dialog, setDialog] = useState({ isOpen: false, type: 'alert', title: '', message: '', onConfirm: null });
      const [toasts, setToasts] = useState([]);

      const showMessage = (title, message) => setDialog({ isOpen: true, type: 'alert', title, message, onConfirm: null });
      const showConfirm = (title, message, onConfirm) => setDialog({ isOpen: true, type: 'confirm', title, message, onConfirm });
      const closeDialog = () => setDialog({ ...dialog, isOpen: false });

      const addToast = (message, type = 'success') => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
      };

      const getInitialSettings = () => {
        const savedSettings = localStorage.getItem('imac_company_settings');
        if (savedSettings) try { return JSON.parse(savedSettings); } catch (e) {}
        return { name: 'IMAC Indústria de Massas Congeladas', address: 'Av. Cel. Cícero Sá, 4000', phone: '(85) 3878-1249' };
      };
      const [companySettings, setCompanySettings] = useState(getInitialSettings);

      useEffect(() => {
        signInAnonymously(auth).catch(err => { console.error(err); setLoadingAuth(false); });
        const unsub = onAuthStateChanged(auth, (u) => {
          if (u) setUser({ ...u, name: 'Equipe Qualidade', role: 'admin' });
          setLoadingAuth(false);
        });
        return () => unsub();
      }, []);

      useEffect(() => {
        if (!user) return;
        if (isFallbackMode) { setFichas(mockFichas); setCustomIngredients(mockIngredients); return; }

        const unsubFichas = onSnapshot(collection(db, 'fichas'), (snap) => {
          setFichas(snap.empty ? [] : snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        }, (err) => {
           if (err.message && err.message.includes('Missing or insufficient permissions')) setIsFallbackMode(true);
        });

        const unsubIng = onSnapshot(collection(db, 'ingredients'), (snap) => {
          setCustomIngredients(snap.empty ? [] : snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        });
        return () => { unsubFichas && unsubFichas(); unsubIng && unsubIng(); }
      }, [user, isFallbackMode]);

      const handleSaveFicha = async (fichaData, msgSuccess = "Ficha salva com sucesso!") => {
        const isNew = !fichaData.id;
        const saveId = isNew ? `FICHA-${Date.now()}` : fichaData.id;
        const payload = { ...fichaData, id: saveId, updatedAt: new Date().toLocaleDateString('pt-BR') };
        
        if (isFallbackMode) {
          setFichas(prev => isNew ? [payload, ...prev] : prev.map(f => f.id === saveId ? payload : f));
          setCurrentView('list'); addToast(msgSuccess, 'success'); return;
        }
        try {
          await setDoc(doc(db, 'fichas', saveId), payload);
          setCurrentView('list'); addToast(msgSuccess, 'success');
        } catch (error) {
          showMessage("Erro de Salvamento", "Ocorreu um erro. Verifique sua conexão ou tente novamente. Detalhe: " + error.message);
        }
      };

      const handleDuplicate = async (fichaToDuplicate) => {
          const duplicatedData = { ...fichaToDuplicate, id: '', name: `${fichaToDuplicate.name} (Cópia)`, status: 'draft', version: 1, updatedAt: new Date().toLocaleDateString('pt-BR'), revisionHistory: [] };
          showConfirm("Duplicar Ficha", `Criar uma cópia da ficha "${fichaToDuplicate.name}"?`, () => {
              setSelectedFicha(duplicatedData); setCurrentView('form');
          });
      };

      const handleDelete = async (id) => {
        showConfirm("Excluir Ficha", "Tem certeza que deseja excluir esta Ficha permanentemente?", async () => {
          if (isFallbackMode) return setFichas(prev => prev.filter(f => f.id !== id));
          try { await deleteDoc(doc(db, 'fichas', id)); addToast("Ficha excluída.", "success"); } 
          catch (error) { showMessage("Erro", error.message); }
        });
      };

      const handleSaveIngredient = async (ingData) => {
        const isNew = !ingData.id;
        const saveId = isNew ? `ING-${Date.now()}` : ingData.id;
        const payload = { ...ingData, id: saveId, updatedAt: new Date().toLocaleDateString('pt-BR') };
        if (isFallbackMode) {
            setCustomIngredients(prev => isNew ? [payload, ...prev] : prev.map(i => i.id === saveId ? payload : i));
            addToast("Ingrediente salvo!", "success"); return;
        }
        try { await setDoc(doc(db, 'ingredients', saveId), payload); addToast("Ingrediente salvo!", "success"); } 
        catch (error) { showMessage("Erro", error.message); }
      };

      const handleDeleteIngredient = async (id) => {
        showConfirm("Excluir Ingrediente", "Excluir permanentemente?", async () => {
          if (isFallbackMode) return setCustomIngredients(prev => prev.filter(i => i.id !== id));
          try { await deleteDoc(doc(db, 'ingredients', id)); addToast("Excluído com sucesso.", "success"); } 
          catch (error) { showMessage("Erro", error.message); }
        });
      };

      const handleNavigateToForm = (ficha = emptyFicha) => {
        setSelectedFicha(ficha); setCurrentView('form');
      };

      if (loadingAuth) return <div className="h-screen w-full flex items-center justify-center bg-slate-50"><div className="animate-spin rounded-full h-12 w-12 border-b-4 border-[#F4B400]"></div></div>;

      return (
        <div className="flex h-screen bg-slate-50 text-gray-800 overflow-hidden print:h-auto print:overflow-visible print:block print:bg-white selection:bg-[#F4B400] selection:text-[#5c3a21]">
          
          <div className="fixed top-4 right-4 z-[200] flex flex-col space-y-2 pointer-events-none">
             {toasts.map(toast => (
                <div key={toast.id} className={`toast-enter bg-white p-4 rounded-xl shadow-2xl border-l-4 flex items-center space-x-3 pointer-events-auto max-w-sm transition-all duration-300 ${toast.type === 'success' ? 'border-green-500 text-green-800' : 'border-blue-500 text-blue-800'}`}>
                   {toast.type === 'success' ? <CheckCircle size={24} className="text-green-500 drop-shadow-sm"/> : <Info size={24} className="text-blue-500 drop-shadow-sm"/>}
                   <p className="text-sm font-semibold">{toast.message}</p>
                </div>
             ))}
          </div>

          {dialog.isOpen && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/40 backdrop-blur-sm p-4 transition-all">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm flex flex-col overflow-hidden animate-[slideIn_0.2s_ease-out]">
                <div className="p-8 text-center space-y-5">
                  <div className={`w-20 h-20 rounded-full flex items-center justify-center mx-auto shadow-inner ${dialog.type === 'confirm' ? 'bg-yellow-100/80 text-yellow-600' : 'bg-blue-100/80 text-blue-600'}`}>
                    {dialog.type === 'confirm' ? <HelpCircle size={40} /> : <Info size={40} />}
                  </div>
                  <h3 className="text-2xl font-black text-[#5c3a21]">{dialog.title}</h3>
                  <p className="text-sm text-gray-600 font-medium leading-relaxed">{dialog.message}</p>
                </div>
                <div className="bg-slate-50 p-5 flex justify-end space-x-3 border-t border-slate-100">
                  {dialog.type === 'confirm' && <button onClick={closeDialog} className="px-5 py-2.5 text-gray-600 font-bold hover:bg-gray-200 transition-colors rounded-xl">Cancelar</button>}
                  <button onClick={() => { if(dialog.onConfirm) dialog.onConfirm(); closeDialog(); }} className="bg-[#5c3a21] hover:bg-[#4a2e1a] text-white px-7 py-2.5 rounded-xl shadow-md font-bold transition-transform hover:scale-105">
                    {dialog.type === 'confirm' ? 'Confirmar' : 'Entendi'}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* SIDEBAR COM A LOGO BRANCA */}
          <aside className={`no-print bg-[#5c3a21] text-white transition-all duration-300 ${sidebarOpen ? 'w-72' : 'w-20'} flex flex-col shadow-[4px_0_24px_rgba(0,0,0,0.15)] z-20 relative`}>
            <div className="p-4 flex items-center justify-center h-24 border-b border-white/10">
              <div className="flex items-center space-x-2 cursor-pointer transition-transform hover:scale-105" onClick={() => setCurrentView('dashboard')}>
                 {sidebarOpen ? (
                    <img src="logo.png" alt="IMAC Logo" className="h-14 max-w-[180px] object-contain brightness-0 invert opacity-95 drop-shadow-sm" />
                 ) : (
                    <div className="w-12 h-12 bg-white/10 rounded-xl flex items-center justify-center border border-white/20 shadow-sm hover:bg-white/20 transition-colors">
                        <img src="logo.png" alt="Icon" className="w-8 h-8 object-contain brightness-0 invert opacity-95" />
                    </div>
                 )}
              </div>
            </div>
            
            <nav className="flex-1 py-8 space-y-2 px-4 overflow-y-auto">
              <NavItem icon={<LayoutDashboard size={22}/>} label="Dashboard" active={currentView === 'dashboard'} onClick={() => setCurrentView('dashboard')} open={sidebarOpen} />
              <NavItem icon={<FileText size={22}/>} label="Fichas Técnicas" active={currentView === 'list'} onClick={() => setCurrentView('list')} open={sidebarOpen} />
              <NavItem icon={<Package size={22}/>} label="Ingredientes" active={currentView === 'ingredients'} onClick={() => setCurrentView('ingredients')} open={sidebarOpen} />
            </nav>
            
            <div className="p-4 border-t border-white/10 text-sm text-[#F4B400] flex justify-center cursor-pointer hover:bg-white/5 transition-colors" onClick={() => setSidebarOpen(!sidebarOpen)}>
              {sidebarOpen ? <div className="flex items-center font-bold tracking-wide"><ChevronLeft size={20} className="mr-1"/> Recolher Menu</div> : <ChevronRight size={24}/>}
            </div>
          </aside>

          <main className="flex-1 flex flex-col h-full relative print:h-auto print:block">
            <header className="no-print h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-8 shadow-sm z-10">
              <h1 className="text-2xl font-black text-[#5c3a21] flex items-center tracking-tight">
                {currentView === 'dashboard' && 'Visão Geral do Sistema'}
                {currentView === 'list' && 'Gestão de Fichas Técnicas'}
                {currentView === 'ingredients' && 'Banco de Matérias-Primas'}
                {currentView === 'form' && (selectedFicha?.id ? `Editando: ${selectedFicha.name}` : 'Criando Nova Ficha')}
                {currentView === 'pdf' && 'Visualização de Impressão'}
                {isFallbackMode && <span className="ml-4 text-[11px] bg-red-100 text-red-600 px-3 py-1.5 rounded-full uppercase font-bold border border-red-200 flex items-center"><Activity size={14} className="mr-1"/> Modo Offline</span>}
              </h1>
              
              <div className="flex items-center space-x-4">
                <div className="text-right hidden md:block">
                  <p className="text-sm font-bold text-[#5c3a21] leading-none">Equipe Qualidade</p>
                  <p className="text-xs text-gray-500 font-medium mt-1">IMAC Alimentos</p>
                </div>
                <div className="w-10 h-10 bg-[#F4B400] rounded-full flex items-center justify-center text-[#5c3a21] font-black shadow-sm border-2 border-white">EQ</div>
              </div>
            </header>

            <div className="flex-1 overflow-auto p-8 h-[calc(100vh-80px)] print:h-auto print:overflow-visible print:block print:p-0">
              {currentView === 'dashboard' && <DashboardView fichas={fichas} customIngredients={customIngredients} onNavigateToForm={handleNavigateToForm} onViewFichas={() => setCurrentView('list')} onViewIngredients={() => setCurrentView('ingredients')} />}
              {currentView === 'list' && <ListView fichas={fichas} onEdit={(f) => { setSelectedFicha(f); setCurrentView('form'); }} onPdf={(f) => { setSelectedFicha(f); setCurrentView('pdf'); }} onNew={() => handleNavigateToForm()} onDelete={handleDelete} onDuplicate={handleDuplicate} addToast={addToast} showMessage={showMessage}/>}
              {currentView === 'ingredients' && <IngredientsView ingredients={customIngredients} onSave={handleSaveIngredient} onDelete={handleDeleteIngredient} showMessage={showMessage} />}
              {currentView === 'form' && <FormView ficha={selectedFicha} customIngredients={customIngredients} onBack={() => setCurrentView('list')} onSave={handleSaveFicha} showMessage={showMessage} showConfirm={showConfirm} addToast={addToast} />}
              {currentView === 'pdf' && <PDFView ficha={selectedFicha} onBack={() => setCurrentView('list')} companySettings={companySettings} />}
            </div>
          </main>
        </div>
      );
    }

    const ChevronLeft = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m15 18-6-6 6-6"/></svg>;
    const ChevronRight = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>;

    const NavItem = ({ icon, label, active, onClick, open }) => (
      <div onClick={onClick} className={`flex items-center space-x-3 p-3.5 rounded-xl cursor-pointer transition-all duration-200 group ${active ? 'bg-[#F4B400] text-[#5c3a21] font-black shadow-[0_4px_12px_rgba(244,180,0,0.3)]' : 'text-white/70 hover:bg-white/10 hover:text-white font-semibold'}`}>
        <div className={`${active ? 'scale-110' : 'group-hover:scale-110'} transition-transform`}>{icon}</div>
        {open && <span className="tracking-wide text-sm">{label}</span>}
      </div>
    );

    const StatCard = ({ title, value, icon, color, bgIcon }) => (
      <div className={`p-6 rounded-2xl border shadow-sm hover:shadow-md transition-shadow flex items-center space-x-5 bg-white relative overflow-hidden`}>
        <div className={`absolute -right-4 -top-4 opacity-5 ${color.replace('text-', 'text-')}`}>{React.cloneElement(icon, { size: 100 })}</div>
        <div className={`p-4 rounded-xl ${bgIcon} ${color} shadow-inner z-10`}>{icon}</div>
        <div className="z-10">
          <p className="text-xs text-gray-500 font-bold uppercase tracking-wider mb-1">{title}</p>
          <h3 className="text-4xl font-black text-gray-800">{value}</h3>
        </div>
      </div>
    );

    // ============================================================================
    // DASHBOARD
    // ============================================================================
    const DashboardView = ({ fichas, customIngredients, onNavigateToForm, onViewFichas, onViewIngredients }) => {
      const recentFichas = [...fichas].reverse().slice(0, 4);
      return (
        <div className="space-y-8 max-w-7xl mx-auto h-full animate-[slideIn_0.3s_ease-out]">
          <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
            <StatCard title="Total de Fichas" value={fichas.length} icon={<FileText size={28} />} color="text-[#5c3a21]" bgIcon="bg-orange-50" />
            <StatCard title="Fichas Ativas" value={fichas.filter(f=>f.status==='active').length} icon={<CheckCircle size={28} />} color="text-green-600" bgIcon="bg-green-50" />
            <StatCard title="Em Rascunho" value={fichas.filter(f=>f.status==='draft').length} icon={<Edit size={28} />} color="text-yellow-600" bgIcon="bg-yellow-50" />
            <StatCard title="Ingredientes" value={customIngredients.length} icon={<Package size={28} />} color="text-blue-600" bgIcon="bg-blue-50" />
          </div>
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
             <div className="lg:col-span-1 space-y-6">
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                   <h3 className="text-lg font-black text-[#5c3a21] flex items-center mb-6"><Zap size={20} className="mr-2 text-[#F4B400]"/> Ações Rápidas</h3>
                   <div className="space-y-3">
                      <button onClick={() => onNavigateToForm()} className="w-full flex items-center justify-between p-4 bg-[#F4B400]/10 hover:bg-[#F4B400]/20 text-[#5c3a21] rounded-xl font-bold transition-all group border border-[#F4B400]/20">
                         <div className="flex items-center"><Plus size={20} className="mr-3"/> Criar Ficha Técnica</div><ChevronRight size={18} className="group-hover:translate-x-1 transition-transform"/>
                      </button>
                      <button onClick={onViewFichas} className="w-full flex items-center justify-between p-4 bg-slate-50 hover:bg-slate-100 text-gray-700 rounded-xl font-bold transition-all group border border-slate-200">
                         <div className="flex items-center"><Search size={20} className="mr-3 text-gray-400"/> Consultar Fichas</div><ChevronRight size={18} className="group-hover:translate-x-1 transition-transform"/>
                      </button>
                      <button onClick={onViewIngredients} className="w-full flex items-center justify-between p-4 bg-slate-50 hover:bg-slate-100 text-gray-700 rounded-xl font-bold transition-all group border border-slate-200">
                         <div className="flex items-center"><Database size={20} className="mr-3 text-gray-400"/> Gerenciar Ingredientes</div><ChevronRight size={18} className="group-hover:translate-x-1 transition-transform"/>
                      </button>
                   </div>
                </div>
                <div className="bg-gradient-to-br from-[#5c3a21] to-[#3a2212] p-6 rounded-2xl shadow-lg text-white relative overflow-hidden">

    // ============================================================================
    // LISTAGEM
    // ============================================================================
    const ListView = ({ fichas, onEdit, onPdf, onNew, onDelete, onDuplicate, addToast, showMessage }) => {
      const [search, setSearch] = useState('');
      const [filterCat, setFilterCat] = useState('');
      const [filterStatus, setFilterStatus] = useState('');
      const [sortConfig, setSortConfig] = useState({ key: 'name', direction: 'asc' });

      let filtered = fichas.filter(f => 
        (f.name.toLowerCase().includes(search.toLowerCase()) || f.code.toLowerCase().includes(search.toLowerCase())) &&
        (filterCat ? f.category === filterCat : true) &&
        (filterStatus ? f.status === filterStatus : true)
      );

      filtered.sort((a, b) => {
        if (a[sortConfig.key] < b[sortConfig.key]) return sortConfig.direction === 'asc' ? -1 : 1;
        if (a[sortConfig.key] > b[sortConfig.key]) return sortConfig.direction === 'asc' ? 1 : -1;
        return 0;
      });

      const handleSort = (key) => {
        let direction = 'asc';
        if (sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
        setSortConfig({ key, direction });
      };

      const handleExportCSV = () => {
        if(filtered.length === 0) return showMessage("Atenção", "Não há dados para exportar.");
        const headers = ['Código', 'Produto', 'Categoria', 'Status', 'Versão'];
        const csvData = filtered.map(f => `"${f.code}","${f.name}","${f.category}","${f.status}",v${f.version}.0`);
        const csvContent = "data:text/csv;charset=utf-8," + headers.join(',') + '\n' + csvData.join('\n');
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `IMAC_Fichas_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
        addToast("Arquivo CSV exportado com sucesso!", "success");
      };

      const categorias = [...new Set(fichas.map(f => f.category).filter(Boolean))];

      return (
        <div className="space-y-6 max-w-7xl mx-auto h-full flex flex-col pb-10 animate-[slideIn_0.2s_ease-out]">
          <div className="flex flex-wrap justify-between items-center bg-white p-5 rounded-2xl border border-slate-200 shadow-sm gap-4">
            <div className="flex items-center space-x-4 flex-1">
              <div className="relative w-80">
                <Search className="absolute left-3.5 top-3 text-slate-400" size={18} />
                <input type="text" placeholder="Buscar por nome ou código..." value={search} onChange={(e) => setSearch(e.target.value)} className="w-full pl-11 pr-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-[#F4B400] focus:border-transparent outline-none text-sm transition-all bg-slate-50 focus:bg-white" />
              </div>
              <select value={filterCat} onChange={e=>setFilterCat(e.target.value)} className="py-2.5 px-4 border border-slate-200 rounded-xl text-sm text-slate-600 outline-none focus:ring-2 focus:ring-[#F4B400] bg-slate-50 font-medium">
                <option value="">Todas as Categorias</option>
                {categorias.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
              <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} className="py-2.5 px-4 border border-slate-200 rounded-xl text-sm text-slate-600 outline-none focus:ring-2 focus:ring-[#F4B400] bg-slate-50 font-medium">
                <option value="">Status (Todos)</option>
                <option value="active">Ativos</option>
                <option value="draft">Rascunhos</option>
                <option value="inactive">Inativos</option>
              </select>
            </div>
            <div className="flex gap-3">
               <button onClick={handleExportCSV} className="bg-slate-800 hover:bg-slate-900 text-white font-bold px-5 py-2.5 rounded-xl shadow-md flex items-center space-x-2 transition-transform hover:scale-105"><Download size={18} /> <span>CSV</span></button>
               <button onClick={onNew} className="bg-[#F4B400] hover:bg-[#e0a600] text-[#5c3a21] font-bold px-6 py-2.5 rounded-xl shadow-md flex items-center space-x-2 transition-transform hover:scale-105"><Plus size={20} /> <span>Nova Ficha</span></button>
            </div>
          </div>

          <div className="bg-white rounded-2xl shadow-sm border border-slate-200 flex-1 overflow-auto">
            <table className="w-full text-sm text-left">
              <thead className="bg-slate-50 text-slate-500 uppercase font-bold text-[11px] sticky top-0 z-10 tracking-wider">
                <tr>
                  <th className="px-6 py-4 cursor-pointer hover:text-[#5c3a21] transition-colors" onClick={() => handleSort('name')}>Produto {sortConfig.key==='name' && (sortConfig.direction==='asc'?<ChevronUp size={14} className="inline"/>:<ChevronDown size={14} className="inline"/>)}</th>
                  <th className="px-6 py-4 cursor-pointer hover:text-[#5c3a21] transition-colors" onClick={() => handleSort('category')}>Categoria {sortConfig.key==='category' && (sortConfig.direction==='asc'?<ChevronUp size={14} className="inline"/>:<ChevronDown size={14} className="inline"/>)}</th>
                  <th className="px-6 py-4 cursor-pointer hover:text-[#5c3a21] transition-colors" onClick={() => handleSort('status')}>Status {sortConfig.key==='status' && (sortConfig.direction==='asc'?<ChevronUp size={14} className="inline"/>:<ChevronDown size={14} className="inline"/>)}</th>
                  <th className="px-6 py-4 text-center">Versão</th>
                  <th className="px-6 py-4 text-right">Ações</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-100">
                {filtered.length === 0 ? <tr><td colSpan="5" className="text-center py-16 text-slate-400 font-medium text-base">Nenhuma ficha encontrada.</td></tr> : filtered.map(f => (
                  <tr key={f.id} className="hover:bg-slate-50/80 transition-colors group">
                    <td className="px-6 py-4 font-medium flex items-center space-x-4">
                        {f.coverImage ? <img src={f.coverImage} className="w-12 h-12 rounded-lg object-cover border border-slate-200 shadow-sm" /> : <div className="w-12 h-12 rounded-lg bg-slate-100 flex items-center justify-center border border-slate-200"><ImageIcon size={20} className="text-slate-300"/></div>}
                        <div><div className="font-bold text-gray-800 text-base">{f.name}</div><div className="text-[11px] text-slate-500 font-medium tracking-wide mt-0.5">{f.code}</div></div>
                    </td>
                    <td className="px-6 py-4 text-slate-600 font-medium">{f.category || '-'}</td>
                    <td className="px-6 py-4">
                      <span className={`px-3 py-1.5 rounded-full text-[10px] uppercase font-bold tracking-wider border ${f.status === 'active' ? 'bg-green-50 text-green-700 border-green-200' : f.status === 'inactive' ? 'bg-red-50 text-red-700 border-red-200' : 'bg-yellow-50 text-yellow-700 border-yellow-200'}`}>
                        {f.status === 'active' ? 'Ativo' : f.status === 'inactive' ? 'Inativo' : 'Rascunho'}
                      </span>
                    </td>
                    <td className="px-6 py-4 text-center text-slate-500 font-bold text-xs bg-slate-50/50">v{f.version}.0</td>
                    <td className="px-6 py-4 text-right">
                      <div className="flex justify-end space-x-2 opacity-80 group-hover:opacity-100 transition-opacity">
                        <button title="Imprimir/PDF" onClick={() => onPdf(f)} className="p-2.5 text-slate-400 hover:text-[#5c3a21] hover:bg-[#F4B400] rounded-xl transition-all"><Printer size={18} /></button>
                        <button title="Duplicar" onClick={() => onDuplicate(f)} className="p-2.5 text-slate-400 hover:text-green-600 hover:bg-green-50 rounded-xl transition-all"><Copy size={18} /></button>
                        <button title="Editar" onClick={() => onEdit(f)} className="p-2.5 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-xl transition-all"><Edit size={18} /></button>
                        <button title="Excluir" onClick={() => onDelete(f.id)} className="p-2.5 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-xl transition-all"><Trash2 size={18} /></button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    };

    // ============================================================================
    // 4. EDIÇÃO (FormView) E SEUS SUB-COMPONENTES
    // ============================================================================
    const InputGroup = ({ label, type = "text", value, onChange, placeholder }) => (
      <div className="flex flex-col space-y-1.5">
        <label className="text-xs font-bold text-slate-600 uppercase tracking-wide">{label}</label>
        <input type={type} value={value} placeholder={placeholder} onChange={e => onChange(e.target.value)} className="p-2.5 border border-slate-300 rounded-xl text-sm focus:ring-2 focus:ring-[#F4B400] focus:border-transparent outline-none transition-shadow bg-slate-50 focus:bg-white" />
      </div>
    );

    const NutriRow = ({ label, val, onChange }) => (
      <tr className="border-b border-slate-100 bg-white hover:bg-slate-50 transition-colors">
        <td className="p-3 text-slate-700 font-medium">{label}</td>
        <td className="p-2 w-40"><input type="number" step="0.1" value={val} onChange={e => onChange(e.target.value)} className="w-full p-2 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-[#F4B400] bg-slate-50" /></td>
      </tr>
    );

    const ImageEditorModal = ({ src, onSave, onCancel, showMessage }) => {
      const canvasRef = useRef(null);
      const [scale, setScale] = useState(1);
      const [offsetX, setOffsetX] = useState(0);
      const [offsetY, setOffsetY] = useState(0);
      const [brightness, setBrightness] = useState(100);
      const [contrast, setContrast] = useState(100);

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.filter = `brightness(${brightness}%) contrast(${contrast}%)`;
          const canvasRatio = canvas.width / canvas.height;
          const imgRatio = img.width / img.height;
          let drawWidth, drawHeight;
          if (imgRatio > canvasRatio) { drawHeight = canvas.height; drawWidth = img.width * (canvas.height / img.height); } 
          else { drawWidth = canvas.width; drawHeight = img.height * (canvas.width / img.width); }
          drawWidth *= scale; drawHeight *= scale;
          const dx = (canvas.width - drawWidth) / 2 + Number(offsetX);
          const dy = (canvas.height - drawHeight) / 2 + Number(offsetY);
          ctx.drawImage(img, dx, dy, drawWidth, drawHeight);
        };
        img.src = src;
      }, [src, scale, offsetX, offsetY, brightness, contrast]);

      const handleConfirm = () => {
        try { onSave(canvasRef.current.toDataURL('image/webp', 0.8)); } 
        catch (error) { showMessage("Erro", "Não foi possível editar esta imagem."); }
      };

      return (
        <div className="absolute inset-0 bg-black/60 backdrop-blur-sm z-[70] flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl flex flex-col overflow-hidden">
            <div className="bg-[#5c3a21] text-white p-5 flex justify-between items-center">
              <h3 className="font-bold flex items-center text-lg"><ImageIcon className="mr-2" size={22}/> Ajuste Fino de Imagem</h3>
              <button onClick={onCancel} className="hover:text-[#F4B400] transition-colors"><X size={24}/></button>
            </div>
            <div className="flex flex-col md:flex-row p-6 gap-6 bg-slate-50 h-[60vh] md:h-auto overflow-y-auto">
              <div className="flex-1 flex flex-col items-center justify-center border-2 border-dashed border-slate-300 rounded-xl p-4" style={{backgroundImage: 'url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAMUlEQVQ4T2NkYNgfQEhjx8DAwEAURgOMakg3hIkNn0mEajgYGIg2hIExGhgNyWYIAGt3Gww9lG9XAAAAAElFTkSuQmCC")'}}>
                 <canvas ref={canvasRef} width={800} height={600} className="w-full max-w-full h-auto shadow-lg bg-transparent" style={{ maxWidth: '600px', aspectRatio: '4/3' }}></canvas>
              </div>
              <div className="w-full md:w-80 space-y-5 bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                <h4 className="font-black text-[#5c3a21] border-b pb-3 text-sm flex items-center"><Settings size={18} className="mr-2"/> Controles Deslizantes</h4>
                <div className="space-y-1.5"><label className="text-xs font-bold text-slate-600 flex justify-between"><span>Zoom</span> <span className="text-[#F4B400]">{scale}x</span></label><input type="range" min="1" max="4" step="0.1" value={scale} onChange={e => setScale(e.target.value)} className="w-full accent-[#F4B400]" /></div>
                <div className="space-y-1.5"><label className="text-xs font-bold text-slate-600">Posição Horizontal</label><input type="range" min="-1000" max="1000" step="10" value={offsetX} onChange={e => setOffsetX(e.target.value)} className="w-full accent-[#F4B400]" /></div>
                <div className="space-y-1.5"><label className="text-xs font-bold text-slate-600">Posição Vertical</label><input type="range" min="-1000" max="1000" step="10" value={offsetY} onChange={e => setOffsetY(e.target.value)} className="w-full accent-[#F4B400]" /></div>
                <div className="space-y-1.5"><label className="text-xs font-bold text-slate-600 flex justify-between"><span>Brilho</span> <span className="text-[#F4B400]">{brightness}%</span></label><input type="range" min="30" max="200" step="5" value={brightness} onChange={e => setBrightness(e.target.value)} className="w-full accent-[#F4B400]" /></div>
                <div className="space-y-1.5"><label className="text-xs font-bold text-slate-600 flex justify-between"><span>Contraste</span> <span className="text-[#F4B400]">{contrast}%</span></label><input type="range" min="30" max="200" step="5" value={contrast} onChange={e => setContrast(e.target.value)} className="w-full accent-[#F4B400]" /></div>
              </div>
            </div>
            <div className="p-5 border-t border-slate-200 flex justify-end gap-4 bg-white">
              <button onClick={onCancel} className="px-5 py-2.5 text-slate-600 font-bold hover:bg-slate-100 rounded-xl transition-colors">Cancelar</button>
              <button onClick={handleConfirm} className="bg-[#5c3a21] text-white px-7 py-2.5 rounded-xl shadow-md font-bold hover:bg-[#4a2e1a] flex items-center transition-transform hover:scale-105"><Save size={18} className="mr-2"/> Aplicar Ajustes</button>
            </div>
          </div>
        </div>
      );
    };

    const FormView = ({ ficha, customIngredients, onBack, onSave, showMessage, showConfirm, addToast }) => {
      const [activeTab, setActiveTab] = useState(1);
      
      const [formData, setFormData] = useState(() => {
          const base = JSON.parse(JSON.stringify(ficha || emptyFicha));
          return {
            ...emptyFicha,
            ...base,
            general: { ...emptyFicha.general, ...(base.general || {}) },
            technical: { ...emptyFicha.technical, ...(base.technical || {}) },
            ingredients: { ...emptyFicha.ingredients, ...(base.ingredients || {}) },
            conservation: { ...emptyFicha.conservation, ...(base.conservation || {}) },
            validity: { ...emptyFicha.validity, ...(base.validity || {}) },
            nutritional: { ...emptyFicha.nutritional, ...(base.nutritional || {}) },
            approval: { ...emptyFicha.approval, ...(base.approval || {}) },
            preparationSteps: base.preparationSteps || [],
            formulation: base.formulation || [],
            revisionHistory: base.revisionHistory || []
          };
      });

      const [editorState, setEditorState] = useState({ isOpen: false, src: null, type: null, stepId: null });
      const tabs = [{ id: 1, label: 'Dados Gerais' }, { id: 2, label: 'Parâmetros Técnicos' }, { id: 3, label: 'Ingredientes/Rótulo' }, { id: 4, label: 'Conservação' }, { id: 5, label: 'Preparo' }, { id: 6, label: 'Tabela Nutricional' }, { id: 7, label: 'Aprovação' }];
      const updateNested = (cat, field, val) => setFormData(p => ({ ...p, [cat]: { ...p[cat], [field]: val } }));

      useEffect(() => {
        const draft = localStorage.getItem('imac_ficha_draft');
        if (draft) {
           const parsed = JSON.parse(draft);
           if (!ficha.id || ficha.id === parsed.id) {
               showConfirm("Recuperar Rascunho", "Encontramos alterações não salvas. Deseja recuperar?", () => {
                   setFormData(parsed); addToast("Rascunho recuperado.", "info");
               });
           }
        }
      }, []);

      useEffect(() => {
         const interval = setInterval(() => { if (formData.name || formData.code) localStorage.setItem('imac_ficha_draft', JSON.stringify(formData)); }, 15000);
         return () => clearInterval(interval);
      }, [formData]);

      const handleExplicitSave = (dataToSave, message) => {
         localStorage.removeItem('imac_ficha_draft'); 
         onSave(dataToSave, message);
      };

      const handleImageUpload = (id, e) => {
        const file = e.target.files[0];
        if (file) compressImageToWebP(file, (dataUrl) => {
           setEditorState({ isOpen: true, src: dataUrl, type: 'step', stepId: id });
        });
      };

      const handleCoverImageUpload = (e) => {
        const file = e.target.files[0];
        if (file) compressImageToWebP(file, (dataUrl) => {
           setEditorState({ isOpen: true, src: dataUrl, type: 'cover', stepId: null });
        });
      };

      const handleEditExistingImage = (type, src, stepId = null) => setEditorState({ isOpen: true, src: src, type: type, stepId: stepId });

      const handleEditorSave = (editedDataUrl) => {
        if (editorState.type === 'cover') setFormData({ ...formData, coverImage: editedDataUrl });
        else if (editorState.type === 'step') {
          setFormData(prev => ({
            ...prev,
            preparationSteps: prev.preparationSteps.map(s => s.id === editorState.stepId ? { ...s, image: editedDataUrl } : s)
          }));
        }
        setEditorState({ isOpen: false, src: null, type: null, stepId: null });
      };

      const recalcFormulation = (form, yieldVal, portionVal) => {
        if (!form || form.length === 0) return setFormData(prev => ({ ...prev, formulation: form }));
        const sumWeight = form.reduce((sum, item) => sum + Number(item.qty || 0), 0);
        const y = parseFloat(yieldVal) || sumWeight;
        const p = parseFloat(portionVal) || 0;
        const factor = y > 0 ? (p / y) : 0;

        const totals = form.reduce((acc, item) => {
           const itemFactor = Number(item.qty || 0) / 100;
           acc.kcal += (item.base.kcal || 0) * itemFactor; acc.carbs += (item.base.carbs || 0) * itemFactor;
           acc.totalSugars += (item.base.totalSugars || 0) * itemFactor; acc.addedSugars += (item.base.addedSugars || 0) * itemFactor;
           acc.proteins += (item.base.proteins || 0) * itemFactor; acc.totalFats += (item.base.totalFats || 0) * itemFactor;
           acc.satFats += (item.base.satFats || 0) * itemFactor; acc.transFats += (item.base.transFats || 0) * itemFactor;
           acc.fiber += (item.base.fiber || 0) * itemFactor; acc.sodium += (item.base.sodium || 0) * itemFactor;
           return acc;
        }, { kcal:0, carbs:0, totalSugars:0, addedSugars:0, proteins:0, totalFats:0, satFats:0, transFats:0, fiber:0, sodium:0 });

        setFormData(prev => ({
           ...prev, formulation: form,
           nutritional: {
              ...prev.nutritional, finalYield: yieldVal, portion: portionVal,
              kcal: round2(totals.kcal * factor).toFixed(1), carbs: round2(totals.carbs * factor).toFixed(1),
              totalSugars: round2(totals.totalSugars * factor).toFixed(1), addedSugars: round2(totals.addedSugars * factor).toFixed(1),
              proteins: round2(totals.proteins * factor).toFixed(1), totalFats: round2(totals.totalFats * factor).toFixed(1),
              satFats: round2(totals.satFats * factor).toFixed(1), transFats: round2(totals.transFats * factor).toFixed(1),
              fiber: round2(totals.fiber * factor).toFixed(1), sodium: round2(totals.sodium * factor).toFixed(1)
           }
        }));
      };

      return (
        <div className="max-w-6xl mx-auto bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col h-full relative overflow-hidden animate-[slideIn_0.3s_ease-out]">
          
          {editorState.isOpen && (
             <ImageEditorModal src={editorState.src} onSave={handleEditorSave} onCancel={() => setEditorState({ isOpen: false, src: null, type: null, stepId: null })} showMessage={showMessage} />
          )}

              <InputGroup label="Código Interno (SKU)" value={formData.code} onChange={v => setFormData({...formData, code: v})} />

            <div className="grid grid-cols-2 gap-5">
              <InputGroup label="Categoria" value={formData.category} onChange={v => setFormData({...formData, category: v})} placeholder="Ex: Pães, Salgados..." />
              <InputGroup label="Marca" value={formData.general.brand} onChange={v => updateNested('general', 'brand', v)} />

            <div className="flex flex-col space-y-1.5">

              <label className="text-xs font-bold text-slate-600 uppercase tracking-wide">Status do Produto</label>
              <select className="p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-[#F4B400] outline-none text-sm font-medium bg-slate-50" value={formData.status} onChange={e => setFormData({...formData, status: e.target.value})}>
                <option value="active">Ativo (Em Produção)</option>
                <option value="draft">Rascunho (Em Desenvolvimento)</option>
                <option value="inactive">Inativo (Fora de Linha)</option>

         </div>
         <div>

            <div className="flex gap-2 mb-3">
              <input type="text" placeholder="URL da imagem (opcional)" value={formData.coverImage} onChange={e => setFormData({...formData, coverImage: e.target.value})} className="flex-1 p-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-[#F4B400] outline-none text-sm bg-slate-50" />
              <label className="bg-slate-800 text-white px-4 py-2.5 rounded-xl text-sm font-bold cursor-pointer hover:bg-slate-900 flex items-center shrink-0 transition-transform hover:scale-105 shadow-md">
                <Upload size={18} className="mr-2"/> Subir

              </label>
            </div>
            
            <div className="border-2 border-dashed border-slate-300 h-64 flex flex-col items-center justify-center rounded-2xl relative overflow-hidden group shadow-inner" style={{backgroundImage: 'url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAMUlEQVQ4T2NkYNgfQEhjx8DAwEAURgOMakg3hIkNn0mEajgYGIg2hIExGhgNyWYIAGt3Gww9lG9XAAAAAElFTkSuQmCC")'}}>

                    </div>
                  </>

                  <div className="text-center text-slate-400 font-medium bg-white/80 w-full h-full flex flex-col items-center justify-center backdrop-blur-sm"><ImageIcon size={40} className="mx-auto mb-3 text-slate-300" /> Nenhuma Imagem Selecionada</div>
               )}
            </div>
         </div>
      </div>
    );

    const TabTecnicos = ({ formData, updateNested }) => (

        <h4 className="font-black text-[#5c3a21] text-lg border-b border-slate-200 pb-2">Especificações de Embalagem</h4>
        <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
          <InputGroup label="Unidades por Pacote" type="number" value={formData.technical.unitsPerPackage} onChange={v => updateNested('technical', 'unitsPerPackage', v)} />
          <InputGroup label="Peso do Pacote (ex: 5kg)" value={formData.technical.packageWeight} onChange={v => updateNested('technical', 'packageWeight', v)} />
          <InputGroup label="Peso por Unidade (ex: 70g)" value={formData.technical.unitWeight} onChange={v => updateNested('technical', 'unitWeight', v)} />
          <InputGroup label="Qtd por Tela/Assadeira" type="number" value={formData.technical.perTray} onChange={v => updateNested('technical', 'perTray', v)} />
        </div>
      </div>
    );

    const TabIngredientes = ({ formData, updateNested }) => (
      <div className="space-y-6">
        <div className="flex flex-col space-y-1.5">
           <label className="text-xs font-bold text-slate-600 uppercase tracking-wide">Lista de Ingredientes (Texto Completo)</label>
           <textarea rows="6" className="w-full p-4 border border-slate-300 rounded-xl outline-none text-sm bg-slate-50 focus:bg-white focus:ring-2 focus:ring-[#F4B400]" value={formData.ingredients.text} onChange={e => updateNested('ingredients', 'text', e.target.value)} placeholder="Ex: Farinha de trigo enriquecida com ferro e ácido fólico, água, sal..." />
        </div>
        <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200 grid grid-cols-2 md:grid-cols-3 gap-6 items-center">
           <label className="flex items-center space-x-3 font-bold text-sm bg-white p-3 border border-slate-200 rounded-xl cursor-pointer hover:border-[#F4B400] transition-colors"><input type="checkbox" checked={formData.ingredients.containsGluten} onChange={e => updateNested('ingredients', 'containsGluten', e.target.checked)} className="w-5 h-5 accent-[#F4B400]" /> <span>Contém Glúten</span></label>
           <label className="flex items-center space-x-3 font-bold text-sm bg-white p-3 border border-slate-200 rounded-xl cursor-pointer hover:border-[#F4B400] transition-colors"><input type="checkbox" checked={formData.ingredients.containsLactose} onChange={e => updateNested('ingredients', 'containsLactose', e.target.checked)} className="w-5 h-5 accent-[#F4B400]" /> <span>Contém Lactose</span></label>
           <div className="col-span-2 md:col-span-1"><InputGroup label="Aviso de Alérgicos" placeholder="Ex: DERIVADOS DE TRIGO E SOJA..." value={formData.ingredients.allergensText} onChange={v => updateNested('ingredients', 'allergensText', v)} /></div>
        </div>
      </div>
    );

    const TabConservacao = ({ formData, updateNested }) => (
      <div className="space-y-8">
        <h4 className="font-black text-[#5c3a21] text-lg border-b border-slate-200 pb-2">Regras de Armazenamento e Shelf-Life</h4>
        <div className="grid grid-cols-2 gap-8">
          <InputGroup label="Temperatura de Armazenamento (Congelado)" value={formData.conservation.frozen} onChange={v => updateNested('conservation', 'frozen', v)} placeholder="Ex: -12°C ou mais frio" />
          <InputGroup label="Validade na Embalagem Fechada" value={formData.validity.package} onChange={v => updateNested('validity', 'package', v)} placeholder="Ex: 90 dias" />
          <InputGroup label="Validade após Embalagem Aberta" value={formData.conservation.openPackage} onChange={v => updateNested('conservation', 'openPackage', v)} placeholder="Ex: 15 dias" />
          <InputGroup label="Validade Pós-Preparo/Assamento" value={formData.validity.postBaking} onChange={v => updateNested('validity', 'postBaking', v)} placeholder="Ex: Consumo Imediato" />
        </div>
      </div>
    );

    const TabPreparo = ({ formData, setFormData, handleImageUpload, handleEditExistingImage }) => {
      const [draggedStepIndex, setDraggedStepIndex] = useState(null);

      const addStep = () => setFormData({...formData, preparationSteps: [...formData.preparationSteps, { id: Date.now(), title: '', desc: '', image: '' }]});
      const remStep = (id) => setFormData({...formData, preparationSteps: formData.preparationSteps.filter(s => s.id !== id)});
      const updStep = (id, f, v) => setFormData({...formData, preparationSteps: formData.preparationSteps.map(s => s.id === id ? { ...s, [f]: v } : s)});

      const handleDragStart = (index) => setDraggedStepIndex(index);
      const handleDragOver = (e) => e.preventDefault();
      const handleDrop = (index) => {
        if (draggedStepIndex === null || draggedStepIndex === index) return;
        const newSteps = [...formData.preparationSteps];
        const draggedItem = newSteps[draggedStepIndex];
        newSteps.splice(draggedStepIndex, 1);
        newSteps.splice(index, 0, draggedItem);
        const renumberedSteps = newSteps.map((step, idx) => ({ ...step, id: idx + 1 }));
        setFormData({ ...formData, preparationSteps: renumberedSteps });
        setDraggedStepIndex(null);
      };

      return (
        <div className="space-y-6">
          <div className="flex justify-between items-center bg-slate-50 p-4 rounded-xl border border-slate-200">
             <h4 className="font-black text-[#5c3a21] flex items-center"><CheckCircle className="mr-2 text-green-600" size={20}/> Passo a Passo Operacional</h4>
             <button onClick={addStep} className="bg-[#5c3a21] hover:bg-[#4a2e1a] text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center transition-transform hover:scale-105 shadow-md"><Plus size={18} className="mr-2"/> Adicionar Etapa</button>
          </div>
          
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            {formData.preparationSteps.map((step, index) => (
              <div 
                key={step.id} 
                className={`border border-slate-200 p-4 relative bg-white flex shadow-sm hover:shadow-md rounded-2xl transition-all duration-200 ${draggedStepIndex === index ? 'opacity-40 scale-95 border-[#F4B400]' : ''}`}
                draggable onDragStart={() => handleDragStart(index)} onDragOver={handleDragOver} onDrop={() => handleDrop(index)}
              >
                <div className="absolute top-3 left-3 text-slate-300 hover:text-[#5c3a21] cursor-grab active:cursor-grabbing z-10"><GripVertical size={20} /></div>
                <button onClick={() => remStep(step.id)} className="absolute top-3 right-3 text-red-500 z-10 bg-white rounded-full p-1.5 shadow hover:bg-red-50 transition-colors"><Trash2 size={16}/></button>
                
                <div className="w-32 h-24 bg-slate-50 border border-slate-200 flex-shrink-0 relative flex items-center justify-center ml-8 mr-4 rounded-xl overflow-hidden group">
                  {step.image ? (
                    <>
                      <img src={step.image} className="w-full h-full object-cover"/>
                      <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex items-center justify-center gap-2 transition-all backdrop-blur-sm">
                        <button onClick={() => handleEditExistingImage('step', step.image, step.id)} className="bg-[#F4B400] text-[#5c3a21] p-2 rounded-lg shadow-md hover:bg-[#e0a600]"><Edit size={16}/></button>
                        <label className="cursor-pointer bg-white text-gray-800 p-2 rounded-lg shadow-md hover:bg-gray-100"><Upload size={16}/><input type="file" className="hidden" onChange={(e) => handleImageUpload(step.id, e)}/></label>
                      </div>
                    </>
                  ) : (
                    <label className="cursor-pointer text-[10px] uppercase font-bold text-slate-400 hover:text-[#F4B400] text-center w-full h-full flex flex-col items-center justify-center transition-colors"><ImageIcon size={24} className="mb-2"/>Adicionar Foto<input type="file" className="hidden" onChange={(e) => handleImageUpload(step.id, e)}/></label>
                  )}
                </div>

                <div className="flex-1 flex flex-col">
                  <input type="text" placeholder={`Etapa ${index + 1}`} value={step.title} onChange={e => updStep(step.id, 'title', e.target.value)} className="font-black text-sm mb-2 bg-transparent border-b border-slate-200 outline-none text-[#5c3a21] pb-1 placeholder:text-slate-300 focus:border-[#F4B400] transition-colors" />
                  <textarea placeholder="Descrição dos procedimentos..." value={step.desc} onChange={e => updStep(step.id, 'desc', e.target.value)} className="text-xs bg-transparent outline-none flex-1 resize-none text-slate-700 mt-1 placeholder:text-slate-300" />
                </div>
              </div>
            ))}
            
            {formData.preparationSteps.length === 0 && (
               <div className="col-span-1 md:col-span-2 text-center py-10 bg-slate-50 rounded-2xl border border-dashed border-slate-300">
                  <Clock size={40} className="mx-auto mb-3 text-slate-300"/><p className="text-slate-500 font-medium">Nenhuma etapa adicionada. Clique acima para começar.</p>
               </div>
            )}
          </div>
        </div>
      );
    };

    const TabNutricional = ({ formData, setFormData, updateNested, customIngredients, recalcFormulation }) => {
       const [searchModal, setSearchModal] = useState(false);
       const [term, setTerm] = useState('');
       const filtered = customIngredients.filter(i => i.name.toLowerCase().includes(term.toLowerCase()));

       const addItem = (item) => {
          const factor = 100 / parseFloat(item.referencePortion || 100);
          const newItem = {
             id: Date.now(), ingId: item.id, name: item.name, qty: 0,
             base: {
                kcal: parseFloat(item.kcal || 0) * factor, carbs: parseFloat(item.carbs || 0) * factor,
                totalSugars: parseFloat(item.totalSugars || 0) * factor, addedSugars: parseFloat(item.addedSugars || 0) * factor,
                proteins: parseFloat(item.proteins || 0) * factor, totalFats: parseFloat(item.totalFats || 0) * factor,
                satFats: parseFloat(item.satFats || 0) * factor, transFats: parseFloat(item.transFats || 0) * factor,
                fiber: parseFloat(item.fiber || 0) * factor, sodium: parseFloat(item.sodium || 0) * factor
             }
          };
          const newForm = [...(formData.formulation || []), newItem];
          recalcFormulation(newForm, formData.nutritional.finalYield, formData.nutritional.portion);
          setSearchModal(false); setTerm('');
       };

         <div className="space-y-8 relative">

                   <div className="flex justify-between items-center mb-5 border-b pb-3"><h3 className="font-black text-lg text-[#5c3a21] flex items-center"><Search size={20} className="mr-2"/> Buscar Ingrediente</h3><button onClick={()=>setSearchModal(false)} className="text-slate-400 hover:text-[#F4B400] transition-colors"><X/></button></div>
                   <input type="text" placeholder="Digite o nome..." value={term} onChange={e=>setTerm(e.target.value)} className="w-full p-3 border border-slate-300 rounded-xl mb-4 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-[#F4B400] outline-none"/>
                   <div className="flex-1 overflow-y-auto space-y-2 pr-2">
                      {filtered.length === 0 ? <p className="text-center text-slate-400 py-4 font-medium">Nenhum ingrediente encontrado.</p> : filtered.map(i => (
                         <div key={i.id} className="border border-slate-200 bg-white p-3 flex justify-between rounded-xl items-center hover:border-[#F4B400] transition-colors group">
                            <div><span className="text-sm font-bold text-gray-800 block">{i.name}</span><span className="text-[10px] text-slate-500 uppercase">{i.supplier || 'Sem fornecedor'}</span></div>
                            <button onClick={()=>addItem(i)} className="bg-[#F4B400] text-[#5c3a21] px-4 py-2 rounded-lg text-xs font-bold shadow-sm hover:bg-[#e0a600] transition-transform hover:scale-105">Adicionar</button>
                         </div>
                      ))}
                   </div>
                </div>
             </div>
           )}

           <div className="bg-gradient-to-br from-[#FFFDF5] to-white border border-[#F4B400]/40 shadow-sm rounded-2xl p-6">
              <div className="flex justify-between items-center border-b border-slate-200 pb-3 mb-5">
                 <h4 className="font-black text-[#5c3a21] text-lg flex items-center"><Calculator className="mr-2" size={22}/> Calculadora de Receituário (Automática)</h4>
                 <button onClick={()=>setSearchModal(true)} className="bg-[#F4B400] hover:bg-[#e0a600] text-[#5c3a21] px-5 py-2.5 rounded-xl text-sm font-bold flex items-center shadow-md transition-transform hover:scale-105"><Plus size={16} className="mr-2"/> Adicionar Ingrediente</button>
              </div>
              
              <div className="bg-white border border-slate-200 rounded-xl p-2 mb-6">
                 <table className="w-full text-sm text-left">
                    <thead className="text-[10px] uppercase text-slate-500 font-bold bg-slate-50 border-b border-slate-200">
                       <tr><th className="p-3">Ingrediente na Receita</th><th className="p-3 text-right">Qtd na Receita (g)</th><th className="p-3 w-16"></th></tr>
                    </thead>
                    <tbody>
                       {(!formData.formulation || formData.formulation.length === 0) ? <tr><td colSpan="3" className="text-xs text-slate-400 italic text-center py-6 font-medium">Nenhum ingrediente adicionado.</td></tr> : formData.formulation.map((item, idx) => (
                          <tr key={idx} className="border-b border-slate-100 last:border-0 hover:bg-slate-50 transition-colors">
                             <td className="p-3 font-bold text-gray-700">{item.name}</td>
                             <td className="p-3 text-right">
                                <div className="flex items-center justify-end space-x-2">
                                   <input type="number" value={item.qty} onChange={e => { const arr = [...formData.formulation]; arr[idx].qty = e.target.value; recalcFormulation(arr, formData.nutritional.finalYield, formData.nutritional.portion); }} className="w-24 p-2 border border-slate-200 rounded-lg text-right text-sm font-mono focus:ring-2 focus:ring-[#F4B400] outline-none bg-slate-50" />
                                   <span className="text-xs font-bold text-slate-400">g</span>
                                </div>
                             </td>
                             <td className="p-3 text-center"><button onClick={() => recalcFormulation(formData.formulation.filter((_, i) => i !== idx), formData.nutritional.finalYield, formData.nutritional.portion)} className="text-slate-300 hover:text-red-500 transition-colors p-1"><Trash2 size={18}/></button></td>
                          </tr>
                       ))}
                    </tbody>
                 </table>
              </div>

              <div className="grid grid-cols-2 md:grid-cols-4 gap-6 bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                 <InputGroup label="Rendimento Final (g)" type="number" value={formData.nutritional.finalYield || ''} onChange={v => { updateNested('nutritional', 'finalYield', v); recalcFormulation(formData.formulation, v, formData.nutritional.portion); }} />
                 <InputGroup label="Porção Padrão (g)" type="number" value={formData.nutritional.portion} onChange={v => { updateNested('nutritional', 'portion', v); recalcFormulation(formData.formulation, formData.nutritional.finalYield, v); }} />
                 <InputGroup label="Medida Caseira" value={formData.nutritional.measure} onChange={v => updateNested('nutritional', 'measure', v)} placeholder="Ex: 1 unidade" />
                 <InputGroup label="Porções por Emb." type="number" value={formData.nutritional.portionsPerPackage} onChange={v => updateNested('nutritional', 'portionsPerPackage', v)} />
              </div>
           </div>

           <div>
              <h4 className="font-black text-[#5c3a21] text-lg border-b border-slate-200 pb-2 mb-4 flex items-center"><Activity className="mr-2 text-[#F4B400]" size={22}/> Tabela Nutricional (Calculada / Editável)</h4>
              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                 <table className="w-full text-sm text-left">
                   <thead className="bg-[#5c3a21] text-[#F4B400] uppercase text-[11px] font-black tracking-wider">

        <tr className={borderBottom ? "border-b border-black" : ""}>

                      {ficha.revisionHistory?.length > 0 && (
                          <div className="mb-8">
                              <h3 className="text-[13px] font-black text-[#5c3a21] border-b border-black pb-1 mb-2">Histórico de Revisões</h3>
                              <table className="w-full text-[9px] border-collapse border border-black">
                                  <thead>
                                      <tr className="bg-gray-100">
                                          <th className="border border-black p-1.5 text-center w-16">Data</th>
                                          <th className="border border-black p-1.5 text-center w-12">Versão</th>
                                          <th className="border border-black p-1.5 text-left">Motivos / Alterações</th>
                                          <th className="border border-black p-1.5 text-center w-24">Elaborador</th>
                                          <th className="border border-black p-1.5 text-center w-24">Revisor</th>
                                          <th className="border border-black p-1.5 text-center w-24">Aprovador</th>
                                      </tr>
                                  </thead>
                                  <tbody>
                                      {ficha.revisionHistory.map(rev => (
                                          <tr key={rev.id}>
                                              <td className="border border-black p-1.5 text-center">{rev.date}</td>
                                              <td className="border border-black p-1.5 text-center font-bold">v{rev.version}.0</td>
                                              <td className="border border-black p-1.5">{rev.notes}</td>
                                              <td className="border border-black p-1.5 text-center">{rev.createdBy}</td>
                                              <td className="border border-black p-1.5 text-center">{rev.reviewedBy}</td>
                                              <td className="border border-black p-1.5 text-center">{rev.approvedBy}</td>
                                          </tr>
                                      ))}
                                  </tbody>
                              </table>
                          </div>
                      )}

                      {ficha.approval?.show && (
                          <div className="border border-black p-4 bg-gray-50 mt-4 relative avoid-break rounded-sm">
                              <div className="text-[9px] font-bold mb-10 flex justify-between border-b border-gray-300 pb-2">
                                  <span className="uppercase text-[#5c3a21] tracking-wide">Controle de Aprovação e Assinaturas</span>
                                  <span className="text-gray-600">Emissão: {new Date().toLocaleString('pt-BR')}</span>
                              </div>
                              <div className="grid grid-cols-3 gap-6 text-center text-[10px] mt-10 pb-2">
                                  <div>
                                      <div className="border-t border-black pt-1.5 mx-4 font-bold text-gray-800">{ficha.approval.createdBy || 'Elaborado por'}</div>
                                  </div>
                                  <div>
                                      <div className="border-t border-black pt-1.5 mx-4 font-bold text-gray-800">{ficha.approval.reviewedBy || 'Revisado por'}</div>
                                  </div>
                                  <div>
                                      <div className="border-t border-black pt-1.5 mx-4 font-bold text-gray-800">{ficha.approval.approvedBy || 'Aprovado por'}</div>
                                  </div>
                              </div>
                          </div>
                      )}
                  </div>
                  <PrintFooter />
              </div>
            )}
          </div>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
