<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema IMAC - Fichas Técnicas</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Import Map para resolver o React e o JSX Runtime do Babel -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client"
      }
    }
  </script>

  <!-- Babel Standalone (Para rodar React no navegador) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- PDF.js para Extração Automática de Fichas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

  <style>
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

    .pdf-container {
      width: 210mm;
      min-height: 297mm;
      margin: 10px auto 40px auto;
      padding: 10mm 15mm;
      background-color: white;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }
    
    @media print {
      html, body, #root {
        height: auto !important; min-height: auto !important; overflow: visible !important;
        margin: 0 !important; padding: 0 !important; background-color: white !important;
        -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; 
      }
      
      @page { margin: 8mm; size: A4 portrait; }
      
      .no-print { display: none !important; }
      
      .pdf-container { 
        display: block !important; width: 100% !important; height: auto !important;
        min-height: auto !important; margin: 0 !important; padding: 0 !important; box-shadow: none !important; 
      }
      
      .page-break { page-break-before: always !important; break-before: page !important; }
      .avoid-break { break-inside: avoid !important; page-break-inside: avoid !important; }
    }
    
    /* Animação para o Toast */
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
    .toast-enter { animation: slideIn 0.3s ease-out forwards; }
    .toast-exit { animation: slideOut 0.3s ease-in forwards; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import * as Lucide from 'https://esm.sh/lucide-react@0.292.0';
    
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    const {
      LayoutDashboard, FileText, Users, Settings, Plus, Search, Filter,
      Edit, Printer, CheckCircle, Info, Database, Upload, Trash2, ArrowLeft,
      Building, MapPin, Phone, Mail, X, Image: ImageIcon, Save, Calculator, Package,
      Copy, GripVertical, AlertTriangle, HelpCircle, Download, ChevronUp, ChevronDown, SaveAll, Check
    } = Lucide;

    // ============================================================================
    // 1. CONFIGURAÇÃO, CONSTANTES E DADOS MOCKADOS
    // ============================================================================
    const firebaseConfig = {
      apiKey: "AIzaSyClLwKGarEcm6g467w-Esi7d7CEgL36mH0", 
      authDomain: "fichas-fd833.firebaseapp.com",
      projectId: "fichas-fd833",
      storageBucket: "fichas-fd833.firebasestorage.app",
      messagingSenderId: "809866493261",
      appId: "1:809866493261:web:cdddabb0039736e4c64b04"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const ImacLogoSVG = ({ className = "h-12" }) => (
      <svg className={className} viewBox="0 0 160 65" xmlns="http://www.w3.org/2000/svg">
        <text x="0" y="55" fontFamily="Arial, Helvetica, sans-serif" fontWeight="900" fontSize="50" fill="#5c3a21" letterSpacing="-2">IMAC</text>
        <g transform="translate(108, -5) scale(0.65)">
           <circle cx="50" cy="50" r="35" fill="#F4B400" />
           <path d="M 35 45 Q 40 36 45 45" stroke="white" strokeWidth="6" strokeLinecap="round" fill="none" />
           <path d="M 55 45 Q 60 36 65 45" stroke="white" strokeWidth="6" strokeLinecap="round" fill="none" />
           <path d="M 30 55 Q 50 75 70 50" stroke="white" strokeWidth="6" strokeLinecap="round" fill="none" />
        </g>
      </svg>
    );

    const emptyFicha = {
      id: '', code: '', name: '', category: '', version: 1, status: 'draft', coverImage: '', general: { brand: 'IMAC', description: '' },
      technical: { unitsPerPackage: 0, packageWeight: '', unitWeight: '', perTray: 0, ovens: [] },
      ingredients: { text: '', containsGluten: false, containsLactose: false, allergensText: '' },
      conservation: { frozen: '', refrigerated: '', ambient: '', openPackage: '', closedPackage: '' },
      validity: { package: '', postBaking: '', postDefrost: '' },
      preparationSteps: [], formulation: [], 
      nutritional: { finalYield: '', portionsPerPackage: 100, portion: 0, measure: '', kcal: 0, carbs: 0, totalSugars: 0, addedSugars: 0, proteins: 0, totalFats: 0, satFats: 0, transFats: 0, fiber: 0, sodium: 0 },
      approval: { show: false, createdBy: '', reviewedBy: '', approvedBy: '' }, revisionHistory: []
    };

    const mockFichas = [
      {
        id: 'PF-001', code: 'PF-001', name: 'Pão Francês', category: 'Pães', version: 1, status: 'active', updatedAt: '16/06/2026',
        coverImage: 'https://images.unsplash.com/photo-1598373182133-52452f7691ef?w=800&q=80',
        general: { brand: 'IMAC', description: 'Pão Francês Tradicional IMAC.' },
        technical: { unitsPerPackage: 71, packageWeight: '5 kg', unitWeight: '70g', perTray: 20, ovens: [{ id: 1, name: 'Forno Lastro', temp: '200°C', time: '17 min', vapor: 'Sim' }] },
        ingredients: { text: 'Farinha de trigo enriquecida de ferro e ácido fólico, água, sal, fermento biológico.', containsGluten: true, containsLactose: false, allergensText: 'DERIVADOS DE TRIGO' },
        conservation: { frozen: '-12°C ou mais frio', openPackage: '1 mês', closedPackage: 'Vide validade' },
        validity: { package: '60 dias', postBaking: 'Diário', postDefrost: 'Não recongelar' },
        preparationSteps: [], formulation: [],
        nutritional: { finalYield: '', portionsPerPackage: 100, portion: 50, measure: '5/7 unidade', kcal: 140, carbs: 24, totalSugars: 0, addedSugars: 0, proteins: 3, totalFats: 3, satFats: 0, transFats: 0, fiber: 1, sodium: 242 }
      }
    ];

    const mockIngredients = [
      { id: 'ING-1', name: 'Farinha de Trigo Especial', supplier: 'Moinho Rosa', referencePortion: 50, kcal: 173, carbs: 36, totalSugars: 0, addedSugars: 0, proteins: 5, totalFats: 0, satFats: 0, transFats: 0, fiber: 1.5, sodium: 0 }
    ];

    const parseIMACPdf = (text, filename) => {
      /* [Código de parser mantido igual ao original] */
      const normalizedText = text.replace(/\s+/g, ' ');
      const getMatch = (regex, fallback = '') => { const m = normalizedText.match(regex); return m ? m[1].trim() : fallback; };
      let name = getMatch(/Ficha Técnica\s+(.*?)\s+Unidades por Pacote/i) || filename.replace('.pdf', '');
      return { ...emptyFicha, name: name, code: 'IMP-' + Math.floor(Math.random()*1000) };
    };

    // Função auxiliar para evitar problema de dízima no JS
    const round2 = (num) => Math.round((num + Number.EPSILON) * 100) / 100;

    // ============================================================================
    // 2. SISTEMA PRINCIPAL (App)
    // ============================================================================
    function App() {
      const [user, setUser] = useState(null);
      const [loadingAuth, setLoadingAuth] = useState(true);
      const [currentView, setCurrentView] = useState('dashboard');
      const [fichas, setFichas] = useState([]);
      const [customIngredients, setCustomIngredients] = useState([]);
      const [selectedFicha, setSelectedFicha] = useState(null);
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [isFallbackMode, setIsFallbackMode] = useState(false);

      // Dialog & Toasts
      const [dialog, setDialog] = useState({ isOpen: false, type: 'alert', title: '', message: '', onConfirm: null });
      const [toasts, setToasts] = useState([]);

      const showMessage = (title, message) => setDialog({ isOpen: true, type: 'alert', title, message, onConfirm: null });
      const showConfirm = (title, message, onConfirm) => setDialog({ isOpen: true, type: 'confirm', title, message, onConfirm });
      const closeDialog = () => setDialog({ ...dialog, isOpen: false });

      const addToast = (message, type = 'success') => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
      };

      // Configurações
      const getInitialSettings = () => {
        const savedSettings = localStorage.getItem('imac_company_settings');
        if (savedSettings) try { return JSON.parse(savedSettings); } catch (e) {}
        return { name: 'IMAC Indústria de Massas Congeladas', address: 'Av. Cel. Cícero Sá, 4000', phone: '(85) 3878-1249', email: 'qualidade@imac.com', logo: '', fichaLogo: '' };
      };
      const [companySettings, setCompanySettings] = useState(getInitialSettings);
      useEffect(() => localStorage.setItem('imac_company_settings', JSON.stringify(companySettings)), [companySettings]);

      // Autenticação e Firestore
      useEffect(() => {
        signInAnonymously(auth).catch(err => { console.error(err); setLoadingAuth(false); });
        const unsub = onAuthStateChanged(auth, (u) => {
          if (u) setUser({ ...u, name: 'Equipe Qualidade', role: 'admin' });
          setLoadingAuth(false);
        });
        return () => unsub();
      }, []);

      useEffect(() => {
        if (!user) return;
        if (isFallbackMode) {
            setFichas(mockFichas); setCustomIngredients(mockIngredients); return;
        }

        const unsubFichas = onSnapshot(collection(db, 'fichas'), (snap) => {
          setFichas(snap.empty ? [] : snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        }, (err) => {
           if (err.message && err.message.includes('Missing or insufficient permissions')) setIsFallbackMode(true);
        });

        const unsubIng = onSnapshot(collection(db, 'ingredients'), (snap) => {
          setCustomIngredients(snap.empty ? [] : snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        });
        return () => { unsubFichas && unsubFichas(); unsubIng && unsubIng(); }
      }, [user, isFallbackMode]);

      // Actions
      const handleSaveFicha = async (fichaData, msgSuccess = "Ficha salva com sucesso!") => {
        const isNew = !fichaData.id;
        const saveId = isNew ? `FICHA-${Date.now()}` : fichaData.id;
        const payload = { ...fichaData, id: saveId, updatedAt: new Date().toLocaleDateString('pt-BR') };
        
        if (isFallbackMode) {
          setFichas(prev => isNew ? [payload, ...prev] : prev.map(f => f.id === saveId ? payload : f));
          setCurrentView('list');
          addToast(msgSuccess, 'success');
          return;
        }
        try {
          await setDoc(doc(db, 'fichas', saveId), payload);
          setCurrentView('list');
          addToast(msgSuccess, 'success');
        } catch (error) {
          showMessage("Erro de Salvamento", error.message);
        }
      };

      const handleDuplicate = async (fichaToDuplicate) => {
          const duplicatedData = { ...fichaToDuplicate, id: '', name: `${fichaToDuplicate.name} (Cópia)`, status: 'draft', version: 1, updatedAt: new Date().toLocaleDateString('pt-BR'), revisionHistory: [] };
          showConfirm("Duplicar Ficha", `Criar uma cópia da ficha "${fichaToDuplicate.name}"?`, () => {
              setSelectedFicha(duplicatedData); setCurrentView('form');
          });
      };

      const handleDelete = async (id) => {
        showConfirm("Excluir Ficha", "Tem certeza que deseja excluir esta Ficha permanentemente?", async () => {
          if (isFallbackMode) return setFichas(prev => prev.filter(f => f.id !== id));
          try { await deleteDoc(doc(db, 'fichas', id)); addToast("Ficha excluída.", "success"); } 
          catch (error) { showMessage("Erro", error.message); }
        });
      };

      const handleSaveIngredient = async (ingData) => {
        const isNew = !ingData.id;
        const saveId = isNew ? `ING-${Date.now()}` : ingData.id;
        const payload = { ...ingData, id: saveId, updatedAt: new Date().toLocaleDateString('pt-BR') };
        if (isFallbackMode) {
            setCustomIngredients(prev => isNew ? [payload, ...prev] : prev.map(i => i.id === saveId ? payload : i));
            addToast("Ingrediente salvo!", "success"); return;
        }
        try { await setDoc(doc(db, 'ingredients', saveId), payload); addToast("Ingrediente salvo!", "success"); } 
        catch (error) { showMessage("Erro", error.message); }
      };

      const handleDeleteIngredient = async (id) => {
        showConfirm("Excluir Ingrediente", "Excluir permanentemente?", async () => {
          if (isFallbackMode) return setCustomIngredients(prev => prev.filter(i => i.id !== id));
          try { await deleteDoc(doc(db, 'ingredients', id)); addToast("Excluído com sucesso.", "success"); } 
          catch (error) { showMessage("Erro", error.message); }
        });
      };

      if (loadingAuth) return <div className="h-screen w-full flex items-center justify-center bg-gray-50"><div className="animate-spin rounded-full h-12 w-12 border-b-4 border-[#F4B400]"></div></div>;

      return (
        <div className="flex h-screen bg-gray-50 text-gray-800 overflow-hidden print:h-auto print:overflow-visible print:block print:bg-white">
          
          {/* TOASTS */}
          <div className="fixed top-4 right-4 z-[200] flex flex-col space-y-2 pointer-events-none">
             {toasts.map(toast => (
                <div key={toast.id} className={`toast-enter bg-white p-3 rounded shadow-lg border-l-4 flex items-center space-x-3 pointer-events-auto max-w-sm ${toast.type === 'success' ? 'border-green-500 text-green-700' : 'border-blue-500 text-blue-700'}`}>
                   {toast.type === 'success' ? <CheckCircle size={20} className="text-green-500"/> : <Info size={20} className="text-blue-500"/>}
                   <p className="text-sm font-bold">{toast.message}</p>
                </div>
             ))}
          </div>

          {/* Dialog Modal Global */}
          {dialog.isOpen && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 p-4">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm flex flex-col overflow-hidden">
                <div className="p-6 text-center space-y-4">
                  <div className={`w-16 h-16 rounded-full flex items-center justify-center mx-auto shadow-inner ${dialog.type === 'confirm' ? 'bg-yellow-100 text-yellow-600' : 'bg-blue-100 text-blue-600'}`}>
                    {dialog.type === 'confirm' ? <HelpCircle size={32} /> : <Info size={32} />}
                  </div>
                  <h3 className="text-xl font-bold text-[#5c3a21]">{dialog.title}</h3>
                  <p className="text-sm text-gray-500">{dialog.message}</p>
                </div>
                <div className="bg-gray-50 p-4 flex justify-end space-x-3 border-t border-gray-200">
                  {dialog.type === 'confirm' && <button onClick={closeDialog} className="px-4 py-2 text-gray-600 font-bold hover:bg-gray-200 rounded">Cancelar</button>}
                  <button onClick={() => { if(dialog.onConfirm) dialog.onConfirm(); closeDialog(); }} className="bg-[#5c3a21] hover:bg-[#4a2e1a] text-white px-6 py-2 rounded shadow font-bold">
                    {dialog.type === 'confirm' ? 'Confirmar' : 'OK'}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* SIDEBAR */}
          <aside className={`no-print bg-[#5c3a21] text-white transition-all duration-300 ${sidebarOpen ? 'w-64' : 'w-20'} flex flex-col shadow-2xl z-20`}>
            <div className="p-4 flex items-center justify-center h-20 border-b border-[#4a2e1a]">
              <div className="flex items-center space-x-2 font-black cursor-pointer" onClick={() => setCurrentView('dashboard')}>
                 {sidebarOpen ? (
                    companySettings.logo ? <div className="bg-white py-1 px-2 rounded-lg shadow-md flex justify-center"><img src={companySettings.logo} className="h-10 max-w-[180px] object-contain" /></div> : <div className="bg-white py-1 px-2 rounded-lg shadow-md flex justify-center"><ImacLogoSVG className="h-10" /></div>
                 ) : <div className="w-10 h-10 bg-[#F4B400] rounded-full flex items-center justify-center text-[#5c3a21] text-sm font-black shadow-md">IM</div>}
              </div>
            </div>
            <nav className="flex-1 py-6 space-y-2 px-3 overflow-y-auto">
              <NavItem icon={<LayoutDashboard size={20}/>} label="Dashboard" active={currentView === 'dashboard'} onClick={() => setCurrentView('dashboard')} open={sidebarOpen} />
              <NavItem icon={<FileText size={20}/>} label="Fichas Técnicas" active={currentView === 'list'} onClick={() => setCurrentView('list')} open={sidebarOpen} />
              <NavItem icon={<Package size={20}/>} label="Ingredientes" active={currentView === 'ingredients'} onClick={() => setCurrentView('ingredients')} open={sidebarOpen} />
              <NavItem icon={<Users size={20}/>} label="Utilizadores" active={currentView === 'users'} onClick={() => setCurrentView('users')} open={sidebarOpen} />
              <NavItem icon={<Settings size={20}/>} label="Configurações" active={currentView === 'settings'} onClick={() => setCurrentView('settings')} open={sidebarOpen} />
            </nav>
            <div className="p-4 border-t border-[#4a2e1a] text-sm text-[#F4B400] flex justify-center cursor-pointer hover:bg-[#4a2e1a]" onClick={() => setSidebarOpen(!sidebarOpen)}>
              {sidebarOpen ? "« Recolher Menu" : "»"}
            </div>
          </aside>

          {/* MAIN CONTENT AREA */}
          <main className="flex-1 flex flex-col h-full relative print:h-auto print:block">
            <header className="no-print h-20 bg-white border-b border-gray-200 flex items-center justify-between px-8 shadow-sm z-10">
              <h1 className="text-2xl font-bold text-[#5c3a21] flex items-center">
                {currentView === 'dashboard' && 'Dashboard de Qualidade'}
                {currentView === 'list' && 'Gerenciamento de Fichas Técnicas'}
                {currentView === 'ingredients' && 'Banco de Ingredientes Próprio'}
                {currentView === 'form' && (selectedFicha?.id ? `Editar Ficha: ${selectedFicha.name}` : 'Nova Ficha Técnica')}
                {currentView === 'pdf' && 'Visualização de Impressão PDF'}
                {isFallbackMode && <span className="ml-4 text-[10px] bg-red-100 text-red-600 px-2 py-1 rounded uppercase font-bold border border-red-200">Modo Offline</span>}
              </h1>
            </header>

            <div className="flex-1 overflow-auto bg-gray-50 p-6 h-[calc(100vh-80px)] print:h-auto print:overflow-visible print:block print:p-0">
              {currentView === 'dashboard' && <DashboardView fichas={fichas} customIngredients={customIngredients} />}
              {currentView === 'list' && <ListView fichas={fichas} onEdit={(f) => { setSelectedFicha(f); setCurrentView('form'); }} onPdf={(f) => { setSelectedFicha(f); setCurrentView('pdf'); }} onNew={() => { setSelectedFicha(emptyFicha); setCurrentView('form'); }} onDelete={handleDelete} onDuplicate={handleDuplicate} addToast={addToast} showMessage={showMessage}/>}
              {currentView === 'ingredients' && <IngredientsView ingredients={customIngredients} onSave={handleSaveIngredient} onDelete={handleDeleteIngredient} showMessage={showMessage} />}
              {currentView === 'form' && <FormView ficha={selectedFicha} customIngredients={customIngredients} onBack={() => setCurrentView('list')} onSave={handleSaveFicha} showMessage={showMessage} showConfirm={showConfirm} addToast={addToast} />}
              {currentView === 'pdf' && <PDFView ficha={selectedFicha} onBack={() => setCurrentView('list')} companySettings={companySettings} />}
            </div>
          </main>
        </div>
      );
    }

    const NavItem = ({ icon, label, active, onClick, open }) => (
      <div onClick={onClick} className={`flex items-center space-x-3 p-3 rounded-lg cursor-pointer transition-all ${active ? 'bg-[#F4B400] text-[#5c3a21] font-bold shadow-md' : 'text-gray-300 hover:bg-[#4a2e1a] hover:text-white font-medium'}`}>
        {icon}{open && <span>{label}</span>}
      </div>
    );

    const StatCard = ({ title, value, icon, color }) => (
      <div className={`p-6 rounded-xl border shadow-sm flex items-center space-x-4 ${color}`}>
        <div className="p-3 bg-gray-50 rounded-lg border">{icon}</div>
        <div><p className="text-xs text-gray-500 font-bold uppercase">{title}</p><h3 className="text-3xl font-black text-[#5c3a21]">{value}</h3></div>
      </div>
    );

    const DashboardView = ({ fichas, customIngredients }) => (
      <div className="space-y-6 max-w-7xl mx-auto">
        <div className="grid grid-cols-1 md:grid-cols-5 gap-6">
          <StatCard title="Total" value={fichas.length} icon={<FileText size={24} className="text-[#5c3a21]" />} color="bg-white border-gray-200" />
          <StatCard title="Ativos" value={fichas.filter(f=>f.status==='active').length} icon={<CheckCircle size={24} className="text-green-600" />} color="bg-white border-l-4 border-l-green-500" />
          <StatCard title="Rascunhos" value={fichas.filter(f=>f.status==='draft').length} icon={<Edit size={24} className="text-yellow-500" />} color="bg-white border-l-4 border-l-yellow-400" />
        </div>
      </div>
    );

    // ============================================================================
    // 3. TELA DE LISTAGEM E EXPORTAÇÃO CSV
    // ============================================================================
    const ListView = ({ fichas, onEdit, onPdf, onNew, onDelete, onDuplicate, addToast, showMessage }) => {
      const [search, setSearch] = useState('');
      const [filterCat, setFilterCat] = useState('');
      const [filterStatus, setFilterStatus] = useState('');
      const [sortConfig, setSortConfig] = useState({ key: 'name', direction: 'asc' });

      // Filtragem
      let filtered = fichas.filter(f => 
        (f.name.toLowerCase().includes(search.toLowerCase()) || f.code.toLowerCase().includes(search.toLowerCase())) &&
        (filterCat ? f.category === filterCat : true) &&
        (filterStatus ? f.status === filterStatus : true)
      );

      // Ordenação
      filtered.sort((a, b) => {
        if (a[sortConfig.key] < b[sortConfig.key]) return sortConfig.direction === 'asc' ? -1 : 1;
        if (a[sortConfig.key] > b[sortConfig.key]) return sortConfig.direction === 'asc' ? 1 : -1;
        return 0;
      });

      const handleSort = (key) => {
        let direction = 'asc';
        if (sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
        setSortConfig({ key, direction });
      };

      const handleExportCSV = () => {
        if(filtered.length === 0) return showMessage("Atenção", "Não há dados para exportar.");
        const headers = ['Código', 'Produto', 'Categoria', 'Status', 'Versão'];
        const csvData = filtered.map(f => `"${f.code}","${f.name}","${f.category}","${f.status}",v${f.version}.0`);
        const csvContent = "data:text/csv;charset=utf-8," + headers.join(',') + '\n' + csvData.join('\n');
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `IMAC_Fichas_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
        addToast("Arquivo CSV exportado com sucesso!", "success");
      };

      const categorias = [...new Set(fichas.map(f => f.category).filter(Boolean))];

      return (
        <div className="space-y-6 max-w-7xl mx-auto h-full flex flex-col pb-10">
          <div className="flex flex-wrap justify-between items-center bg-white p-4 rounded-xl border border-gray-200 shadow-sm gap-4">
            <div className="flex items-center space-x-3 flex-1">
              <div className="relative w-72">
                <Search className="absolute left-3 top-2.5 text-gray-400" size={18} />
                <input type="text" placeholder="Buscar por nome ou código..." value={search} onChange={(e) => setSearch(e.target.value)} className="w-full pl-10 pr-4 py-2 border rounded-lg focus:ring-2 outline-none text-sm" />
              </div>
              <select value={filterCat} onChange={e=>setFilterCat(e.target.value)} className="py-2 px-3 border rounded-lg text-sm text-gray-600 outline-none focus:ring-2 bg-gray-50">
                <option value="">Todas Categorias</option>
                {categorias.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
              <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} className="py-2 px-3 border rounded-lg text-sm text-gray-600 outline-none focus:ring-2 bg-gray-50">
                <option value="">Todos Status</option>
                <option value="active">Ativo</option>
                <option value="draft">Rascunho</option>
                <option value="inactive">Inativo</option>
              </select>
            </div>
            <div className="flex gap-3">
               <button onClick={handleExportCSV} className="bg-gray-800 hover:bg-gray-700 text-white font-bold px-4 py-2 rounded-lg shadow flex items-center space-x-2 transition-colors"><Download size={18} /> <span>CSV</span></button>
               <button onClick={onNew} className="bg-[#F4B400] hover:bg-[#d9a000] text-[#5c3a21] font-bold px-5 py-2 rounded-lg shadow flex items-center space-x-2 transition-colors"><Plus size={18} /> <span>Nova Ficha</span></button>
            </div>
          </div>

          <div className="bg-white rounded-xl shadow-sm border flex-1 overflow-auto">
            <table className="w-full text-sm text-left">
              <thead className="bg-[#5c3a21] text-white uppercase font-bold text-xs sticky top-0 z-10">
                <tr>
                  <th className="px-6 py-4 cursor-pointer hover:bg-[#4a2e1a]" onClick={() => handleSort('name')}>Produto {sortConfig.key==='name' && (sortConfig.direction==='asc'?<ChevronUp size={14} className="inline"/>:<ChevronDown size={14} className="inline"/>)}</th>
                  <th className="px-6 py-4 cursor-pointer hover:bg-[#4a2e1a]" onClick={() => handleSort('category')}>Categoria {sortConfig.key==='category' && (sortConfig.direction==='asc'?<ChevronUp size={14} className="inline"/>:<ChevronDown size={14} className="inline"/>)}</th>
                  <th className="px-6 py-4 cursor-pointer hover:bg-[#4a2e1a]" onClick={() => handleSort('status')}>Status {sortConfig.key==='status' && (sortConfig.direction==='asc'?<ChevronUp size={14} className="inline"/>:<ChevronDown size={14} className="inline"/>)}</th>
                  <th className="px-6 py-4 text-center">Revisão</th>
                  <th className="px-6 py-4 text-right">Ações</th>
                </tr>
              </thead>
              <tbody>
                {filtered.length === 0 ? <tr><td colSpan="5" className="text-center py-10 text-gray-500">Nenhuma ficha técnica encontrada.</td></tr> : filtered.map(f => (
                  <tr key={f.id} className="border-b hover:bg-[#fffdf5]">
                    <td className="px-6 py-4 font-medium flex items-center space-x-4">
                        {f.coverImage ? <img src={f.coverImage} className="w-10 h-10 rounded object-cover border" /> : <div className="w-10 h-10 rounded bg-gray-100 flex items-center justify-center"><ImageIcon size={16} className="text-gray-400"/></div>}
                        <div><div className="font-bold text-[#5c3a21]">{f.name}</div><div className="text-[10px] text-gray-500 font-mono">{f.code}</div></div>
                    </td>
                    <td className="px-6 py-4 text-gray-600">{f.category}</td>
                    <td className="px-6 py-4">
                      <span className={`px-2 py-1 rounded text-[10px] uppercase font-bold tracking-wider border ${f.status === 'active' ? 'bg-green-50 text-green-700 border-green-200' : f.status === 'inactive' ? 'bg-red-50 text-red-700 border-red-200' : 'bg-yellow-50 text-yellow-700 border-yellow-200'}`}>
                        {f.status === 'active' ? 'Ativo' : f.status === 'inactive' ? 'Inativo' : 'Rascunho'}
                      </span>
                    </td>
                    <td className="px-6 py-4 text-center text-gray-500 font-mono text-xs">v{f.version}.0</td>
                    <td className="px-6 py-4 text-right space-x-1">
                      <button onClick={() => onPdf(f)} className="p-2 text-gray-400 hover:text-[#5c3a21] hover:bg-[#F4B400] rounded"><Printer size={18} /></button>
                      <button onClick={() => onDuplicate(f)} className="p-2 text-gray-400 hover:text-green-600 hover:bg-green-50 rounded"><Copy size={18} /></button>
                      <button onClick={() => onEdit(f)} className="p-2 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded"><Edit size={18} /></button>
                      <button onClick={() => onDelete(f.id)} className="p-2 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded"><Trash2 size={18} /></button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    };

    // ============================================================================
    // 4. TELA DE EDIÇÃO (FormView) COM AUTO-SAVE E VERSIONAMENTO
    // ============================================================================
    const FormView = ({ ficha, customIngredients, onBack, onSave, showMessage, showConfirm, addToast }) => {
      const [activeTab, setActiveTab] = useState(1);
      const [formData, setFormData] = useState({ formulation: [], ...JSON.parse(JSON.stringify(ficha)) });
      const [ingSearchModalOpen, setIngSearchModalOpen] = useState(false);
      const [ingSearchTerm, setIngSearchTerm] = useState('');
      const tabs = [{ id: 1, label: 'Gerais' }, { id: 2, label: 'Técnicos' }, { id: 3, label: 'Ingredientes' }, { id: 4, label: 'Conserv./Valid.' }, { id: 6, label: 'Preparo' }, { id: 7, label: 'Nutricional' }, { id: 8, label: 'Aprovação' }];

      const updateNested = (cat, field, val) => setFormData(p => ({ ...p, [cat]: { ...p[cat], [field]: val } }));

      // Recuperação de Rascunho Automático (On Mount)
      useEffect(() => {
        const draft = localStorage.getItem('imac_ficha_draft');
        if (draft) {
           const parsed = JSON.parse(draft);
           // Se era edição da mesma ficha ou se era uma ficha nova
           if (!ficha.id || ficha.id === parsed.id) {
               showConfirm("Recuperar Rascunho", "Encontramos alterações não salvas. Deseja recuperar os dados do último preenchimento automático?", () => {
                   setFormData(parsed);
                   addToast("Rascunho recuperado.", "info");
               });
           }
        }
      }, []);

      // Salvamento Automático (A cada 15 seg se houver mudanças)
      useEffect(() => {
         const interval = setInterval(() => {
            if (formData.name || formData.code) {
               localStorage.setItem('imac_ficha_draft', JSON.stringify(formData));
            }
         }, 15000);
         return () => clearInterval(interval);
      }, [formData]);

      const handleExplicitSave = (dataToSave, message) => {
         localStorage.removeItem('imac_ficha_draft'); // Limpa o rascunho ao salvar de verdade
         onSave(dataToSave, message);
      };

      // Cálculo Nutricional com Precisão Corrigida
      const recalcFormulation = (form, yieldVal, portionVal) => {
        if (!form || form.length === 0) return setFormData(prev => ({ ...prev, formulation: form }));
        const sumWeight = form.reduce((sum, item) => sum + Number(item.qty || 0), 0);
        const y = parseFloat(yieldVal) || sumWeight;
        const p = parseFloat(portionVal) || 0;
        const factor = y > 0 ? (p / y) : 0;

        const totals = form.reduce((acc, item) => {
           const itemFactor = Number(item.qty || 0) / 100;
           acc.kcal += (item.base.kcal || 0) * itemFactor; acc.carbs += (item.base.carbs || 0) * itemFactor;
           acc.totalSugars += (item.base.totalSugars || 0) * itemFactor; acc.addedSugars += (item.base.addedSugars || 0) * itemFactor;
           acc.proteins += (item.base.proteins || 0) * itemFactor; acc.totalFats += (item.base.totalFats || 0) * itemFactor;
           acc.satFats += (item.base.satFats || 0) * itemFactor; acc.transFats += (item.base.transFats || 0) * itemFactor;
           acc.fiber += (item.base.fiber || 0) * itemFactor; acc.sodium += (item.base.sodium || 0) * itemFactor;
           return acc;
        }, { kcal:0, carbs:0, totalSugars:0, addedSugars:0, proteins:0, totalFats:0, satFats:0, transFats:0, fiber:0, sodium:0 });

        setFormData(prev => ({
           ...prev, formulation: form,
           nutritional: {
              ...prev.nutritional, finalYield: yieldVal, portion: portionVal,
              kcal: round2(totals.kcal * factor).toFixed(1), carbs: round2(totals.carbs * factor).toFixed(1),
              totalSugars: round2(totals.totalSugars * factor).toFixed(1), addedSugars: round2(totals.addedSugars * factor).toFixed(1),
              proteins: round2(totals.proteins * factor).toFixed(1), totalFats: round2(totals.totalFats * factor).toFixed(1),
              satFats: round2(totals.satFats * factor).toFixed(1), transFats: round2(totals.transFats * factor).toFixed(1),
              fiber: round2(totals.fiber * factor).toFixed(1), sodium: round2(totals.sodium * factor).toFixed(1)
           }
        }));
      };

      return (
        <div className="max-w-6xl mx-auto bg-white rounded-xl shadow border flex flex-col h-full relative">
          
          <div className="bg-white border-b border-gray-200 p-4 flex justify-between items-center z-10">
            <button onClick={onBack} className="flex items-center space-x-2 text-gray-500 hover:text-[#5c3a21] font-medium"><ArrowLeft size={18} /> <span>Voltar</span></button>
            <div className="font-black text-[#5c3a21] text-lg uppercase flex items-center">
                {formData.id ? `Edição: v${formData.version}.0` : 'Nova Ficha Técnica'}
            </div>
            <div className="flex gap-2">
               {formData.id && (
                  <button onClick={() => {
                     showConfirm("Nova Versão", "Deseja salvar estas alterações como uma nova versão? (O histórico antigo será preservado).", () => {
                         const newVerData = { ...formData, version: formData.version + 1 };
                         handleExplicitSave(newVerData, `Versão ${newVerData.version}.0 criada com sucesso!`);
                     });
                  }} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded shadow font-bold flex items-center space-x-2 text-sm"><SaveAll size={16} /> <span className="hidden md:inline">Salvar como Nova Versão</span></button>
               )}
               <button onClick={() => handleExplicitSave(formData)} className="bg-[#5c3a21] hover:bg-[#4a2e1a] text-white px-6 py-2 rounded shadow font-bold flex items-center space-x-2 text-sm"><Save size={16} /> <span>{formData.id ? 'Salvar Alterações' : 'Salvar Ficha'}</span></button>
            </div>
          </div>

          <div className="flex border-b overflow-x-auto bg-gray-50 px-2 scrollbar-hide shrink-0">
            {tabs.map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`px-5 py-3 text-sm font-bold border-b-2 whitespace-nowrap ${activeTab === tab.id ? 'border-[#F4B400] text-[#5c3a21] bg-white' : 'border-transparent text-gray-500 hover:text-[#5c3a21]'}`}>{tab.id}. {tab.label}</button>
            ))}
          </div>

          <div className="flex-1 p-6 overflow-y-auto bg-white">
            {/* MICRO COMPONENTES DE ABAS CHAMADOS AQUI */}
            {activeTab === 1 && <TabGerais formData={formData} setFormData={setFormData} updateNested={updateNested} />}
            {activeTab === 2 && <TabTecnicos formData={formData} updateNested={updateNested} />}
            {activeTab === 3 && <TabIngredientes formData={formData} updateNested={updateNested} />}
            {activeTab === 4 && <TabConservacao formData={formData} updateNested={updateNested} />}
            {activeTab === 6 && <TabPreparo formData={formData} setFormData={setFormData} />}
            {activeTab === 7 && <TabNutricional formData={formData} setFormData={setFormData} updateNested={updateNested} customIngredients={customIngredients} recalcFormulation={recalcFormulation} />}
            {activeTab === 8 && <TabAprovacao formData={formData} setFormData={setFormData} updateNested={updateNested} />}
          </div>
        </div>
      );
    };

    // Sub-Componentes do FormView para organização do código
    const TabGerais = ({ formData, setFormData, updateNested }) => (
      <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
         <div className="md:col-span-2 space-y-5">
            <div className="grid grid-cols-2 gap-4">
              <InputGroup label="Nome do Produto" value={formData.name} onChange={v => setFormData({...formData, name: v})} />
              <InputGroup label="Código Interno" value={formData.code} onChange={v => setFormData({...formData, code: v})} />
            </div>
            <div className="grid grid-cols-2 gap-4">
              <InputGroup label="Categoria" value={formData.category} onChange={v => setFormData({...formData, category: v})} />
              <InputGroup label="Marca" value={formData.general.brand} onChange={v => updateNested('general', 'brand', v)} />
            </div>
            <div className="flex flex-col space-y-1">
              <label className="text-xs font-bold text-gray-700 uppercase">Descrição Comercial</label>
              <textarea rows="4" className="p-2 border rounded focus:ring-1 focus:ring-[#F4B400] outline-none text-sm" value={formData.general.description} onChange={e => updateNested('general', 'description', e.target.value)} />
            </div>
            <div className="flex flex-col space-y-1 w-1/2">
              <label className="text-xs font-bold text-gray-700 uppercase">Status do Produto</label>
              <select className="p-2 border rounded focus:ring-1 outline-none text-sm" value={formData.status} onChange={e => setFormData({...formData, status: e.target.value})}>
                <option value="active">Ativo (Produção)</option>
                <option value="draft">Rascunho</option>
                <option value="inactive">Inativo (Fora de Linha)</option>
              </select>
            </div>
         </div>
         <div>
            <label className="text-xs font-bold text-gray-700 uppercase block mb-1">Capa (URL)</label>
            <input type="text" placeholder="Cole a URL..." value={formData.coverImage} onChange={e => setFormData({...formData, coverImage: e.target.value})} className="w-full p-2 border rounded text-sm mb-2" />
            <div className="border-2 border-dashed h-56 flex flex-col items-center justify-center bg-gray-50 rounded relative overflow-hidden group">
               {formData.coverImage ? <img src={formData.coverImage} className="absolute inset-0 w-full h-full object-cover" /> : <div className="text-center text-gray-400 text-sm"><ImageIcon size={32} className="mx-auto mb-2" /> Sem Imagem</div>}
            </div>
         </div>
      </div>
    );

    const TabTecnicos = ({ formData, updateNested }) => (
      <div className="space-y-6">
        <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
          <InputGroup label="Unidades/Pacote" type="number" value={formData.technical.unitsPerPackage} onChange={v => updateNested('technical', 'unitsPerPackage', v)} />
          <InputGroup label="Peso do Pacote" value={formData.technical.packageWeight} onChange={v => updateNested('technical', 'packageWeight', v)} />
          <InputGroup label="Peso por Unidade" value={formData.technical.unitWeight} onChange={v => updateNested('technical', 'unitWeight', v)} />
          <InputGroup label="Qtd por Tela" type="number" value={formData.technical.perTray} onChange={v => updateNested('technical', 'perTray', v)} />
        </div>
      </div>
    );

    const TabIngredientes = ({ formData, updateNested }) => (
      <div className="space-y-6">
        <textarea rows="6" className="w-full p-3 border rounded outline-none text-sm" value={formData.ingredients.text} onChange={e => updateNested('ingredients', 'text', e.target.value)} placeholder="Texto descritivo de ingredientes..." />
        <div className="bg-gray-50 p-4 rounded border grid grid-cols-2 gap-4">
           <label className="flex items-center space-x-2 font-bold text-sm"><input type="checkbox" checked={formData.ingredients.containsGluten} onChange={e => updateNested('ingredients', 'containsGluten', e.target.checked)} /> <span>Contém Glúten</span></label>
           <label className="flex items-center space-x-2 font-bold text-sm"><input type="checkbox" checked={formData.ingredients.containsLactose} onChange={e => updateNested('ingredients', 'containsLactose', e.target.checked)} /> <span>Contém Lactose</span></label>
           <div className="col-span-2"><InputGroup label="Alérgicos" placeholder="Ex: CONTÉM DERIVADOS DE TRIGO..." value={formData.ingredients.allergensText} onChange={v => updateNested('ingredients', 'allergensText', v)} /></div>
        </div>
      </div>
    );

    const TabConservacao = ({ formData, updateNested }) => (
      <div className="grid grid-cols-2 gap-6">
        <InputGroup label="Temp. Armazenamento" value={formData.conservation.frozen} onChange={v => updateNested('conservation', 'frozen', v)} />
        <InputGroup label="Validade (Fechado)" value={formData.validity.package} onChange={v => updateNested('validity', 'package', v)} />
        <InputGroup label="Validade (Aberto)" value={formData.conservation.openPackage} onChange={v => updateNested('conservation', 'openPackage', v)} />
        <InputGroup label="Validade (Pós-Preparo)" value={formData.validity.postBaking} onChange={v => updateNested('validity', 'postBaking', v)} />
      </div>
    );

    const TabPreparo = ({ formData, setFormData }) => {
      const addStep = () => setFormData({...formData, preparationSteps: [...formData.preparationSteps, { id: Date.now(), title: '', desc: '', image: '' }]});
      const remStep = (id) => setFormData({...formData, preparationSteps: formData.preparationSteps.filter(s => s.id !== id)});
      const updStep = (id, f, v) => setFormData({...formData, preparationSteps: formData.preparationSteps.map(s => s.id === id ? { ...s, [f]: v } : s)});
      
      return (
        <div className="space-y-4">
          <button onClick={addStep} className="bg-[#5c3a21] text-white px-3 py-1.5 rounded text-sm font-bold flex items-center"><Plus size={16}/> Adicionar Etapa</button>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {formData.preparationSteps.map(step => (
              <div key={step.id} className="border p-3 bg-gray-50 flex shadow-sm rounded relative">
                <button onClick={() => remStep(step.id)} className="absolute top-2 right-2 text-red-500 bg-white rounded-full p-1 shadow-sm"><Trash2 size={16}/></button>
                <div className="flex-1 flex flex-col pr-6">
                  <input type="text" placeholder="Título da Etapa" value={step.title} onChange={e => updStep(step.id, 'title', e.target.value)} className="font-bold text-sm mb-1 bg-transparent border-b outline-none text-[#5c3a21]" />
                  <textarea placeholder="Descrição..." value={step.desc} onChange={e => updStep(step.id, 'desc', e.target.value)} className="text-xs bg-transparent outline-none flex-1 mt-1 resize-none" rows="3"/>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    const TabNutricional = ({ formData, setFormData, updateNested, customIngredients, recalcFormulation }) => {
       const [searchModal, setSearchModal] = useState(false);
       const [term, setTerm] = useState('');
       const filtered = customIngredients.filter(i => i.name.toLowerCase().includes(term.toLowerCase()));

       const addItem = (item) => {
          const factor = 100 / parseFloat(item.referencePortion || 100);
          const newItem = {
             id: Date.now(), ingId: item.id, name: item.name, qty: 0,
             base: {
                kcal: parseFloat(item.kcal || 0) * factor, carbs: parseFloat(item.carbs || 0) * factor,
                totalSugars: parseFloat(item.totalSugars || 0) * factor, addedSugars: parseFloat(item.addedSugars || 0) * factor,
                proteins: parseFloat(item.proteins || 0) * factor, totalFats: parseFloat(item.totalFats || 0) * factor,
                satFats: parseFloat(item.satFats || 0) * factor, transFats: parseFloat(item.transFats || 0) * factor,
                fiber: parseFloat(item.fiber || 0) * factor, sodium: parseFloat(item.sodium || 0) * factor
             }
          };
          const newForm = [...(formData.formulation || []), newItem];
          recalcFormulation(newForm, formData.nutritional.finalYield, formData.nutritional.portion);
          setSearchModal(false); setTerm('');
       };

       return (
         <div className="space-y-6 relative">
           {searchModal && (
             <div className="absolute inset-0 bg-white z-50 p-4 border rounded shadow-2xl flex flex-col">
                <div className="flex justify-between items-center mb-4"><h3 className="font-bold">Buscar Ingrediente</h3><button onClick={()=>setSearchModal(false)}><X/></button></div>
                <input type="text" placeholder="Nome..." value={term} onChange={e=>setTerm(e.target.value)} className="w-full p-2 border rounded mb-4"/>
                <div className="flex-1 overflow-y-auto space-y-2">
                   {filtered.map(i => <div key={i.id} className="border p-2 flex justify-between rounded items-center"><span className="text-sm font-bold">{i.name}</span><button onClick={()=>addItem(i)} className="bg-[#F4B400] px-3 py-1 rounded text-xs font-bold">Add</button></div>)}
                </div>
             </div>
           )}

           <div className="bg-yellow-50/50 border rounded p-5">
              <div className="flex justify-between items-center border-b pb-2 mb-4">
                 <h4 className="font-bold text-[#5c3a21] flex"><Calculator className="mr-2" size={18}/> Formulação Automatizada</h4>
                 <button onClick={()=>setSearchModal(true)} className="bg-[#F4B400] text-[#5c3a21] px-4 py-2 rounded text-xs font-bold">Buscar Ingrediente</button>
              </div>
              <div className="space-y-2 mb-4">
                 {(!formData.formulation || formData.formulation.length === 0) ? <p className="text-xs text-gray-500 italic text-center py-2">Nenhum ingrediente.</p> : formData.formulation.map((item, idx) => (
                    <div key={idx} className="flex items-center justify-between bg-white p-2 border rounded">
                       <span className="text-sm font-bold text-gray-700">{item.name}</span>
                       <div className="flex items-center space-x-2">
                          <input type="number" value={item.qty} onChange={e => { const arr = [...formData.formulation]; arr[idx].qty = e.target.value; recalcFormulation(arr, formData.nutritional.finalYield, formData.nutritional.portion); }} className="w-20 p-1 border rounded text-right text-sm" />
                          <span className="text-xs font-bold w-4">g</span>
                          <button onClick={() => recalcFormulation(formData.formulation.filter((_, i) => i !== idx), formData.nutritional.finalYield, formData.nutritional.portion)} className="text-red-500"><Trash2 size={16}/></button>
                       </div>
                    </div>
                 ))}
              </div>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4 bg-white p-3 rounded border">
                 <InputGroup label="Rendimento Final (g)" type="number" value={formData.nutritional.finalYield || ''} onChange={v => { updateNested('nutritional', 'finalYield', v); recalcFormulation(formData.formulation, v, formData.nutritional.portion); }} />
                 <InputGroup label="Porção (g)" type="number" value={formData.nutritional.portion} onChange={v => { updateNested('nutritional', 'portion', v); recalcFormulation(formData.formulation, formData.nutritional.finalYield, v); }} />
                 <InputGroup label="Medida Caseira" value={formData.nutritional.measure} onChange={v => updateNested('nutritional', 'measure', v)} />
                 <InputGroup label="Porções/Emb." type="number" value={formData.nutritional.portionsPerPackage} onChange={v => updateNested('nutritional', 'portionsPerPackage', v)} />
              </div>
           </div>

                                  </thead>
                                  <tbody>
                                      {ficha.revisionHistory.map(rev => (
                                          <tr key={rev.id}>
                                              <td className="border border-black p-1 text-center">{rev.date}</td>
                                              <td className="border border-black p-1 text-center font-bold">v{rev.version}.0</td>
                                              <td className="border border-black p-1">{rev.notes}</td>
                                              <td className="border border-black p-1 text-center">{rev.createdBy}</td>
                                              <td className="border border-black p-1 text-center">{rev.reviewedBy}</td>
                                              <td className="border border-black p-1 text-center">{rev.approvedBy}</td>
                                          </tr>
                                      ))}
                                  </tbody>
                              </table>
                          </div>
                      )}

                      {ficha.approval?.show && (
                          <div className="border border-black p-3 bg-white mt-4 relative avoid-break">
                              <div className="text-[9px] font-bold mb-8 flex justify-between border-b pb-1">
                                  <span className="uppercase text-[#5c3a21]">Controle de Aprovação e Assinaturas</span>
                                  <span className="text-gray-600">Emissão: {new Date().toLocaleString('pt-BR')}</span>
                              </div>
                              <div className="grid grid-cols-3 gap-6 text-center text-[9px] mt-8 pb-2">
                                  <div>
                                      <div className="border-t border-black pt-1 mx-4 font-bold text-gray-800">{ficha.approval.createdBy || 'Elaborado por'}</div>
                                  </div>
                                  <div>
                                      <div className="border-t border-black pt-1 mx-4 font-bold text-gray-800">{ficha.approval.reviewedBy || 'Revisado por'}</div>
                                  </div>
                                  <div>
                                      <div className="border-t border-black pt-1 mx-4 font-bold text-gray-800">{ficha.approval.approvedBy || 'Aprovado por'}</div>
                                  </div>
                              </div>
                          </div>
                      )}
                  </div>
                  <PrintFooter />
              </div>
            )}
          </div>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
