        ingredients: { text: 'Farinha de trigo enriquecida com ferro e ácido fólico, ovo, amido modificado, soro de leite em pó, gema de ovo em pó, sal, açúcar, farinha de trigo pré-gelatinizada, gordura hidrogenada, água, fermento biológico, proprionato de cálcio, reforçador de farinha (A.C ascórbico INS/300).', containsGluten: true, containsLactose: true, allergensText: 'LEITE E DERIVADOS, OVO, DERIVADOS DE TRIGO E SOJA' },
        conservation: { frozen: '-12°C ou mais frio', refrigerated: 'N/A', ambient: 'N/A', openPackage: '1 mês', closedPackage: 'Vide validade' },
        validity: { package: '60 dias', postBaking: 'Diário', postDefrost: 'Não recongelar' },
        preparationSteps: [
          { id: 1, title: 'Pão Congelado', desc: 'Após aplicar untaforma, colocar 24 pães por tela; Deixar os pães no carrinho para desgelo por 1 hora.', image: '' },
          { id: 2, title: 'Pão em Desgelo', desc: 'Após o desgelo colocar saco aberto cobrindo as telas e fechar a porta do mesmo.', image: '' },
          { id: 3, title: 'Pão em Fermentação', desc: 'Deixar os pães fermentarem por 2 horas. Após esse período, pincelar gema diluída (50g gema + 50g água) sobre os pães (Obs.: se for levado à fritadeira, não pincelar gema diluída).', image: '' },
          { id: 4, title: 'Pão Assado / Frito', desc: 'FORNO - Lastro: 180°C/15min sem vapor; Turbo: 165°C/17min com turbo. FRITURA - Pré-assamento (Lastro 180°C/8min ou Turbo 160°C/8min) em seguida fritadeira previamente aquecida a 150°C/5min até dourar (virar o lado).', image: '' }
        ],
        formulation: [],
        nutritional: { finalYield: '', portion: 50, measure: '1 + 2/5 unidade', kcal: 196, carbs: 23, totalSugars: 4, addedSugars: 2, proteins: 5, totalFats: 6, satFats: 3, transFats: 0, fiber: 1, sodium: 174 }
      }
    ];

    const mockIngredients = [
      { id: 'ING-1', name: 'Farinha de Trigo Especial', supplier: 'Moinho Rosa', referencePortion: 50, kcal: 173, carbs: 36, totalSugars: 0, addedSugars: 0, proteins: 5, totalFats: 0, satFats: 0, transFats: 0, fiber: 1.5, sodium: 0 },
      { id: 'ING-2', name: 'Margarina Folhada 80% Lipídios', supplier: 'Marca Y', referencePortion: 10, kcal: 72, carbs: 0, totalSugars: 0, addedSugars: 0, proteins: 0, totalFats: 8, satFats: 4, transFats: 1.5, fiber: 0, sodium: 60 },
      { id: 'ING-3', name: 'Fermento Biológico Seco', supplier: 'Marca Z', referencePortion: 10, kcal: 35, carbs: 3, totalSugars: 0, addedSugars: 0, proteins: 4, totalFats: 0.5, satFats: 0, transFats: 0, fiber: 2.5, sodium: 5 }
    ];

    const emptyFicha = {
      id: '', code: '', name: '', category: '', version: 1, status: 'draft', coverImage: '',
      general: { brand: 'IMAC', description: '' },
      technical: { unitsPerPackage: 0, packageWeight: '', unitWeight: '', perTray: 0, ovens: [] },
      ingredients: { text: '', containsGluten: false, containsLactose: false, allergensText: '' },
      conservation: { frozen: '', refrigerated: '', ambient: '', openPackage: '', closedPackage: '' },
      validity: { package: '', postBaking: '', postDefrost: '' },
      preparationSteps: [],
      formulation: [], 
      nutritional: { finalYield: '', portion: 0, measure: '', kcal: 0, carbs: 0, proteins: 0, totalFats: 0, satFats: 0, transFats: 0, fiber: 0, sodium: 0 },
      approval: { show: false, createdBy: '', reviewedBy: '', approvedBy: '' },
      revisionHistory: []
    };

    // ============================================================================
    // PARSER DE PDF (EXTRAÇÃO INTELIGENTE DE DADOS DO LAYOUT IMAC)
    // ============================================================================
    const parseIMACPdf = (text, filename) => {
      const normalizedText = text.replace(/\s+/g, ' ');
      const getMatch = (regex, fallback = '') => {
         const m = normalizedText.match(regex);
         return m ? m[1].trim() : fallback;
      };

      let name = getMatch(/Ficha Técnica\s+(.*?)\s+Unidades por Pacote/i);
      if(!name) name = filename.replace('.pdf', '');

      const units = getMatch(/Média de (\d+) unidades/i, "0");
      const packWeight = getMatch(/Peso do Pacote:\s*(.*?)\s+Peso/i, "5 kg");
      const perTray = getMatch(/por tela:\s*(\d+)\s+unidades/i) || getMatch(/vez na fritadeira:\s*(\d+)\s+unidades/i, "0");

      const tempLastro = getMatch(/(\d+°C)\s*\(lastro\)/i);
      const tempTurbo = getMatch(/(\d+°C)\s*\(turbo\)/i);
      const tempFritadeira = getMatch(/Temperatura:\s*(\d+°C)\.?\s+Quantidade/i);
      const time = getMatch(/Tempo de Assamento:\s*(.*?)\s+Quantidade/i, "");
      const vapor = getMatch(/Vapor no forno:\s*(Sim|Não)/i, "Não");

      const ovens = [];
      if (tempLastro) ovens.push({ id: 1, name: 'Forno Lastro', temp: tempLastro, time: time, vapor: vapor });
      if (tempTurbo) ovens.push({ id: 2, name: 'Forno Turbo', temp: tempTurbo, time: time, vapor: vapor });
      if (ovens.length === 0 && tempFritadeira) ovens.push({ id: 1, name: 'Fritadeira', temp: tempFritadeira, time: time, vapor: 'Não' });

      let ingredientsText = getMatch(/Ingredientes\s+(.*?)\s+INFORMAÇÃO NUTRICIONAL/i, "");
      if(!ingredientsText) ingredientsText = getMatch(/Ingredientes\s+(.*?)\s+Informação Nutricional/i, "");

      const containsGluten = /CONTÉM GLÚTEN/i.test(ingredientsText);
      const containsLactose = /CONTÉM LACTOSE/i.test(ingredientsText);
      const allergens = getMatch(/ALÉRGICOS:\s*(.*?)(?=\.|$)/i, "");

      const valPacote = getMatch(/Validade do Pacote\s*(\d+\s+dias)/i, "60 dias");
      const valAssado = getMatch(/Validade Após o Assamento\s*(.*?)\./i) || getMatch(/Validade Após o Assamento\s*(.*?)\s+Ingredientes/i, "Diário");

      const portion = getMatch(/Porção:\s*(\d+)g/i, "50");
      const measure = getMatch(/Porção:\s*\d+g\s*\((.*?)\)/i, "");

      // Extração do Modo de Preparo (Aprimorada com Segurança/Fallback)
      let prepRaw = "";
      const prepMatch = normalizedText.match(/fornecidos pela por[cç][aã]o[\s\.\*\|"']*(.*?)(?:IMAC Ind[uú]stria|Av\. Cel\. C[ií]cero)/i);
      if (prepMatch) {
          prepRaw = prepMatch[1].replace(/\|/g, '').trim(); // Remove "sujeiras" de quebra de tabela do PDF
      }

      let prepSteps = [];
      if (prepRaw) {
         // Quebra onde houver um título terminando em dois pontos (ex: "Pão Congelado:")
         // Regex mais poderoso: Suporta letras acentuadas (À-ÿ), números e símbolos ordinais (º, °).
         const tokens = prepRaw.split(/([A-Z0-9À-Ÿ][A-Za-zÀ-ÿ0-9\s\-\.º°]{2,35}:)/g).filter(s => s.trim() !== "");
         
         let currentId = 1;
         for (let i = 0; i < tokens.length; i++) {
             if (tokens[i].trim().endsWith(':')) {
                 prepSteps.push({
                     id: currentId++,
                     title: tokens[i].replace(':', '').trim(),
                     desc: (tokens[i+1] && !tokens[i+1].trim().endsWith(':')) ? tokens[i+1].trim() : '',
                     image: ''
                 });
             }
         }
      }

      // Fallback de Segurança: Se não conseguiu fatiar em passos, joga todo o texto bruto para o usuário não perder os dados
      if (prepSteps.length === 0 && prepRaw.length > 10) {
          prepSteps.push({
              id: 1,
              title: 'Modo de Preparo (Revisar Textos)',
              desc: prepRaw,
              image: ''
          });
      }

      return {
        id: '', code: 'IMP-' + Math.floor(Math.random()*1000), name: name, category: 'Importado', version: 1, status: 'draft', coverImage: '',
        general: { brand: 'IMAC', description: 'Ficha importada automaticamente via leitura do PDF.' },
        technical: { unitsPerPackage: units, packageWeight: packWeight, unitWeight: '', perTray: perTray, ovens: ovens },
        ingredients: { text: ingredientsText, containsGluten: containsGluten, containsLactose: containsLactose, allergensText: allergens },
        conservation: { frozen: '-12°C ou mais frio', refrigerated: 'N/A', ambient: 'N/A', openPackage: '1 mês', closedPackage: 'Vide validade' },
        validity: { package: valPacote, postBaking: valAssado, postDefrost: 'Não recongelar' },
        preparationSteps: prepSteps,
        formulation: [],
        nutritional: { finalYield: '', portion: portion, measure: measure, kcal: 0, carbs: 0, totalSugars: 0, addedSugars: 0, proteins: 0, totalFats: 0, satFats: 0, transFats: 0, fiber: 0, sodium: 0 }
      };
    };

    // ============================================================================
    // COMPONENTE PRINCIPAL APP
    // ============================================================================
    function App() {
      const [user, setUser] = useState(null);
      const [loadingAuth, setLoadingAuth] = useState(true);
      const [currentView, setCurrentView] = useState('dashboard');
      const [fichas, setFichas] = useState([]);
      const [customIngredients, setCustomIngredients] = useState([]);
      const [selectedFicha, setSelectedFicha] = useState(null);
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [isFallbackMode, setIsFallbackMode] = useState(false);

      const [companySettings, setCompanySettings] = useState({
        name: 'IMAC Indústria de Massas Congeladas',
        address: 'Av. Cel. Cícero Sá, 4000 - Camará, Aquiraz/CE, CEP: 61700-000',
        phone: '(85) 3878-1249',
        email: 'qualidade@imaccongelados.com.br',
        logo: '',
        fichaLogo: '' // Logo exclusiva para ficar fixa nos PDFs
      });

      // Autenticação Firebase
      useEffect(() => {
        const initAuth = async () => {
          try {
            await signInAnonymously(auth);
          } catch (err) {
            console.error("Erro de Autenticação:", err);
            setLoadingAuth(false);
          }
        };
        initAuth();
        
        const unsub = onAuthStateChanged(auth, (u) => {
          if (u) {
            setUser({ ...u, name: 'Equipe Qualidade', role: 'admin' });
          }
          setLoadingAuth(false);
        }, (err) => {
          console.error("Erro de estado Auth:", err);
          setLoadingAuth(false);
        });
        
        return () => unsub && unsub();
      }, []);

      // Sincronizar dados do Firestore
      useEffect(() => {
        if (!user) return;
        
        if (isFallbackMode) {
            setFichas(mockFichas);
            setCustomIngredients(mockIngredients);
            return;
        }

        const colRef = collection(db, 'fichas');
        const unsubFichas = onSnapshot(colRef, (snap) => {
          if (!snap.empty) {
            setFichas(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
          } else {
            setFichas([]);
          }
        }, (err) => {
           console.error("Erro Firestore Fichas:", err);
           if (err.message && err.message.includes('Missing or insufficient permissions')) {
               alert("⚠️ ALERTA DE PERMISSÃO DO FIREBASE!\n\nSeu banco de dados Firestore está bloqueado. O sistema usará dados locais.");
               setIsFallbackMode(true);
           }
        });

        const ingRef = collection(db, 'ingredients');
        const unsubIng = onSnapshot(ingRef, (snap) => {
          if (!snap.empty) {
            setCustomIngredients(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
          } else {
            setCustomIngredients([]);
          }
        }, (err) => console.error("Erro Firestore Ingredientes:", err));
        
        return () => { unsubFichas && unsubFichas(); unsubIng && unsubIng(); }
      }, [user, isFallbackMode]);

      const handleSaveFicha = async (fichaData) => {
        const isNew = !fichaData.id;
        const saveId = isNew ? `FICHA-${Date.now()}` : fichaData.id;
        const payload = { ...fichaData, id: saveId, updatedAt: new Date().toLocaleDateString('pt-BR') };
        
        if (isFallbackMode) {
          setFichas(prev => isNew ? [payload, ...prev] : prev.map(f => f.id === saveId ? payload : f));
          setCurrentView('list');
          return;
        }

        try {
          await setDoc(doc(db, 'fichas', saveId), payload);
          setCurrentView('list');
        } catch (error) {
          console.error(error);
          alert("Erro ao salvar ficha: " + error.message);
        }
      };

      const handleDuplicate = async (fichaToDuplicate) => {
          const duplicatedData = {
              ...fichaToDuplicate,
              id: '', // Remove o ID para gerar um novo no handleSaveFicha
              name: `${fichaToDuplicate.name} (Cópia)`,
              status: 'draft',
              updatedAt: new Date().toLocaleDateString('pt-BR'),
              revisionHistory: [] // Limpa o histórico da cópia
          };
          
          if(confirm(`Deseja criar uma cópia idêntica da ficha "${fichaToDuplicate.name}"?`)){
              // Salva a duplicata e já abre ela para edição
              setSelectedFicha(duplicatedData);
              setCurrentView('form');
          }
      };

      const handleDelete = async (id) => {
        if (confirm("Tem certeza que deseja excluir esta Ficha Técnica?")) {
          if (isFallbackMode) {
            setFichas(prev => prev.filter(f => f.id !== id));
            return;
          }
          try {
            await deleteDoc(doc(db, 'fichas', id));
          } catch (error) {
            alert("Erro ao excluir: " + error.message);
          }
        }
      };

      const handleSaveIngredient = async (ingData) => {
        const isNew = !ingData.id;
        const saveId = isNew ? `ING-${Date.now()}` : ingData.id;
        const payload = { ...ingData, id: saveId, updatedAt: new Date().toLocaleDateString('pt-BR') };
        
        if (isFallbackMode) {
          setCustomIngredients(prev => isNew ? [payload, ...prev] : prev.map(i => i.id === saveId ? payload : i));
          return;
        }
        try {
          await setDoc(doc(db, 'ingredients', saveId), payload);
        } catch (error) {
          alert("Erro ao salvar ingrediente: " + error.message);
        }
      };

      const handleDeleteIngredient = async (id) => {
        if (confirm("Tem certeza que deseja excluir este Ingrediente?")) {
          if (isFallbackMode) {
            setCustomIngredients(prev => prev.filter(i => i.id !== id));
            return;
          }
          try {
            await deleteDoc(doc(db, 'ingredients', id));
          } catch (error) {
            alert("Erro ao excluir ingrediente: " + error.message);
          }
        }
      };

      if (loadingAuth) return <div className="h-screen w-full flex items-center justify-center bg-gray-50"><div className="animate-spin rounded-full h-12 w-12 border-b-4 border-[#F4B400]"></div></div>;

      return (
        <div className="flex h-screen bg-gray-50 text-gray-800 overflow-hidden">
          {/* SIDEBAR */}
          <aside className={`no-print bg-[#5c3a21] text-white transition-all duration-300 ${sidebarOpen ? 'w-64' : 'w-20'} flex flex-col shadow-2xl z-20`}>
            <div className="p-4 flex items-center justify-center h-20 border-b border-[#4a2e1a]">
              <div className="flex items-center space-x-2 font-black cursor-pointer" onClick={() => setCurrentView('dashboard')}>
                 {sidebarOpen ? (
                    companySettings.logo ? (
                      <div className="bg-white py-1 px-2 rounded-lg shadow-md flex items-center justify-center">
                        <img src={companySettings.logo} alt="Logo" className="h-10 max-w-[180px] object-contain" />
                      </div>
                    ) : (
                      <div className="bg-white py-1 px-2 rounded-lg shadow-md flex items-center justify-center">
                        <ImacLogoSVG className="h-10" />
                      </div>
                    )
                 ) : (
                    <div className="w-10 h-10 bg-[#F4B400] rounded-full flex items-center justify-center text-[#5c3a21] text-sm font-black tracking-tighter shadow-md">IM</div>
                 )}
              </div>
            </div>
            <nav className="flex-1 py-6 space-y-2 px-3 overflow-y-auto">
              <NavItem icon={<LayoutDashboard size={20}/>} label="Dashboard" active={currentView === 'dashboard'} onClick={() => setCurrentView('dashboard')} open={sidebarOpen} />
              <NavItem icon={<FileText size={20}/>} label="Fichas Técnicas" active={currentView === 'list'} onClick={() => setCurrentView('list')} open={sidebarOpen} />
              <NavItem icon={<Package size={20}/>} label="Meus Ingredientes" active={currentView === 'ingredients'} onClick={() => setCurrentView('ingredients')} open={sidebarOpen} />
              <NavItem icon={<Users size={20}/>} label="Utilizadores" active={currentView === 'users'} onClick={() => setCurrentView('users')} open={sidebarOpen} />
              <NavItem icon={<Settings size={20}/>} label="Configurações" active={currentView === 'settings'} onClick={() => setCurrentView('settings')} open={sidebarOpen} />
            </nav>
            <div className="p-4 border-t border-[#4a2e1a] text-sm text-[#F4B400] flex justify-center cursor-pointer hover:bg-[#4a2e1a] transition-colors" onClick={() => setSidebarOpen(!sidebarOpen)}>
              {sidebarOpen ? "« Recolher Menu" : "»"}
            </div>
          </aside>

          {/* MAIN CONTENT AREA */}
          <main className="flex-1 flex flex-col h-full relative">
            <header className="no-print h-20 bg-white border-b border-gray-200 flex items-center justify-between px-8 shadow-sm z-10">
              <h1 className="text-2xl font-bold text-[#5c3a21] flex items-center">
                {currentView === 'dashboard' && 'Dashboard de Qualidade'}
                {currentView === 'list' && 'Gerenciamento de Fichas Técnicas'}
                {currentView === 'ingredients' && 'Banco de Ingredientes Próprio'}
                {currentView === 'users' && 'Controle de Utilizadores'}
                {currentView === 'settings' && 'Configurações do Sistema'}
                {currentView === 'form' && (selectedFicha?.id ? `Editar Ficha: ${selectedFicha.name}` : 'Nova Ficha Técnica')}
                {currentView === 'pdf' && 'Visualização de Impressão PDF'}
                {isFallbackMode && <span className="ml-4 text-[10px] bg-red-100 text-red-600 px-2 py-1 rounded uppercase font-bold border border-red-200">Modo Offline (Erro Firebase)</span>}
              </h1>
              <div className="flex items-center space-x-3">
                <div className="w-10 h-10 rounded-full bg-[#F4B400] text-[#5c3a21] flex items-center justify-center font-bold text-lg shadow-inner">CQ</div>
                <div className="hidden md:block text-sm">
                  <p className="font-bold text-[#5c3a21]">{user?.name}</p>
                  <p className="text-gray-500 text-xs uppercase">{user?.role}</p>
                </div>
              </div>
            </header>

            <div className="flex-1 overflow-auto bg-gray-50 p-6 h-[calc(100vh-80px)] relative">
              {currentView === 'dashboard' && <DashboardView fichas={fichas} customIngredients={customIngredients} onNavigate={setCurrentView} />}
              {currentView === 'list' && <ListView fichas={fichas} onEdit={(f) => { setSelectedFicha(f); setCurrentView('form'); }} onPdf={(f) => { setSelectedFicha(f); setCurrentView('pdf'); }} onNew={() => { setSelectedFicha(emptyFicha); setCurrentView('form'); }} onDelete={handleDelete} onImport={(f) => { setSelectedFicha(f); setCurrentView('form'); }} onDuplicate={handleDuplicate} />}
              {currentView === 'ingredients' && <IngredientsView ingredients={customIngredients} onSave={handleSaveIngredient} onDelete={handleDeleteIngredient} />}
              {currentView === 'form' && <FormView ficha={selectedFicha} customIngredients={customIngredients} onBack={() => setCurrentView('list')} onSave={handleSaveFicha} />}
              {currentView === 'pdf' && <PDFView ficha={selectedFicha} onBack={() => setCurrentView('list')} companySettings={companySettings} />}
              {currentView === 'users' && <UsersView />}
              {currentView === 'settings' && <SettingsView companySettings={companySettings} setCompanySettings={setCompanySettings} />}
            </div>
          </main>
        </div>
      );
    }

    // ============================================================================
    // COMPONENTES SECUNDÁRIOS
    // ============================================================================
    const NavItem = ({ icon, label, active, onClick, open }) => (
      <div onClick={onClick} className={`flex items-center space-x-3 p-3 rounded-lg cursor-pointer transition-all ${active ? 'bg-[#F4B400] text-[#5c3a21] font-bold shadow-md' : 'text-gray-300 hover:bg-[#4a2e1a] hover:text-white font-medium'}`}>
        {icon}
        {open && <span>{label}</span>}
      </div>
    );

    const StatCard = ({ title, value, icon, color }) => (
      <div className={`p-6 rounded-xl border shadow-sm flex items-center space-x-4 ${color}`}>
        <div className="p-3 bg-gray-50 rounded-lg shadow-sm border border-gray-100">{icon}</div>
        <div>
          <p className="text-xs text-gray-500 font-bold uppercase tracking-wider">{title}</p>
          <h3 className="text-3xl font-black text-[#5c3a21]">{value}</h3>
        </div>
      </div>
    );

    const DashboardView = ({ fichas, customIngredients, onNavigate }) => {
      const ativos = fichas.filter(f => f.status === 'active').length;
      const rascunhos = fichas.filter(f => f.status === 'draft').length;
      const inativos = fichas.filter(f => f.status === 'inactive').length;
      return (
        <div className="space-y-6 max-w-7xl mx-auto">
          <div className="grid grid-cols-1 md:grid-cols-5 gap-6">
            <StatCard title="Total Cadastradas" value={fichas.length} icon={<FileText size={24} className="text-[#5c3a21]" />} color="bg-white border-gray-200" />
            <StatCard title="Produtos Ativos" value={ativos} icon={<CheckCircle size={24} className="text-green-600" />} color="bg-white border-l-4 border-l-green-500" />
            <StatCard title="Ingredientes" value={customIngredients.length} icon={<Package size={24} className="text-blue-500" />} color="bg-white border-l-4 border-l-blue-400" />
            <StatCard title="Rascunhos" value={rascunhos} icon={<Edit size={24} className="text-yellow-500" />} color="bg-white border-l-4 border-l-yellow-400" />
            <StatCard title="Inativos" value={inativos} icon={<X size={24} className="text-red-500" />} color="bg-white border-l-4 border-l-red-400" />
          </div>
        </div>
      );
    };

    const ListView = ({ fichas, onEdit, onPdf, onNew, onDelete, onImport, onDuplicate }) => {
      const [search, setSearch] = useState('');
      const importPdfRef = React.useRef(null);
      const [isParsing, setIsParsing] = useState(false);

      const filtered = fichas.filter(f => f.name.toLowerCase().includes(search.toLowerCase()) || f.code.toLowerCase().includes(search.toLowerCase()));

      const handlePdfUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setIsParsing(true);

        try {
            const arrayBuffer = await file.arrayBuffer();
            const pdfjsLib = window['pdfjs-dist/build/pdf'];
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

            const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
            let fullText = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                const pageText = textContent.items.map(item => item.str).join(" ");
                fullText += pageText + " ";
            }

            const extractedFicha = parseIMACPdf(fullText, file.name);
            onImport(extractedFicha);

    const ImageEditorModal = ({ src, onSave, onCancel }) => {
      const canvasRef = React.useRef(null);
      const [scale, setScale] = useState(1);
      const [offsetX, setOffsetX] = useState(0);
      const [offsetY, setOffsetY] = useState(0);
      const [brightness, setBrightness] = useState(100);
      const [contrast, setContrast] = useState(100);

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.crossOrigin = "anonymous"; // Permite editar imagens de URLs externas sem travar o Canvas (CORS)
        img.onload = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.filter = `brightness(${brightness}%) contrast(${contrast}%)`;
          
          const canvasRatio = canvas.width / canvas.height;
          const imgRatio = img.width / img.height;
          let drawWidth, drawHeight;

          // Cobre todo o canvas (Object-fit: cover)
          if (imgRatio > canvasRatio) {
              drawHeight = canvas.height;
              drawWidth = img.width * (canvas.height / img.height);
          } else {
              drawWidth = canvas.width;
              drawHeight = img.height * (canvas.width / img.width);
          }

          drawWidth *= scale;
          drawHeight *= scale;

          const dx = (canvas.width - drawWidth) / 2 + Number(offsetX);
          const dy = (canvas.height - drawHeight) / 2 + Number(offsetY);

          ctx.drawImage(img, dx, dy, drawWidth, drawHeight);
        };
        img.src = src;
      }, [src, scale, offsetX, offsetY, brightness, contrast]);

      const handleConfirm = () => {
        try {
          // Gera JPEG otimizado padronizado
          const dataUrl = canvasRef.current.toDataURL('image/jpeg', 0.85);
          onSave(dataUrl);
        } catch (error) {
          alert("Erro de Segurança (CORS): Esta imagem de link externo não permite edição nativa pelo navegador. Por favor, faça o upload direto do seu computador para editá-la.");

      };

              </div>
              <div className="w-full md:w-72 space-y-4 bg-white p-4 rounded-lg border border-gray-200 shadow-sm">

                </div>

      // Estado para Drag and Drop do Modo de Preparo
      const [draggedStepIndex, setDraggedStepIndex] = useState(null);

      const tabs = [{ id: 1, label: 'Gerais' }, { id: 2, label: 'Técnicos' }, { id: 3, label: 'Ingredientes' }, { id: 4, label: 'Conservação/Validade' }, { id: 6, label: 'Preparo' }, { id: 7, label: 'Nutricional' }, { id: 8, label: 'Aprovação' }];

      const updateNested = (cat, field, val) => setFormData(p => ({ ...p, [cat]: { ...p[cat], [field]: val } }));
      const addPrepStep = () => setFormData({ ...formData, preparationSteps: [...formData.preparationSteps, { id: Date.now(), title: '', desc: '', image: '' }] });
      const removePrepStep = (id) => setFormData({ ...formData, preparationSteps: formData.preparationSteps.filter(s => s.id !== id) });
      const updatePrepStep = (id, field, value) => setFormData({ ...formData, preparationSteps: formData.preparationSteps.map(s => s.id === id ? { ...s, [field]: value } : s) });
      
      // Funções de Drag and Drop (Arrastar e Soltar)
      const handleDragStart = (index) => {
        setDraggedStepIndex(index);

      const handleDragOver = (e, index) => {
        e.preventDefault(); // Necessário para permitir o "drop"
      };

      const handleDrop = (index) => {
        if (draggedStepIndex === null || draggedStepIndex === index) return;

        const newSteps = [...formData.preparationSteps];
        const draggedItem = newSteps[draggedStepIndex];
        
        // Remove o item da posição original
        newSteps.splice(draggedStepIndex, 1);
        // Insere na nova posição
        newSteps.splice(index, 0, draggedItem);
        
        // Atualiza os IDs (numeração) para manter a ordem lógica (Passo 1, 2, 3...)
        const renumberedSteps = newSteps.map((step, idx) => ({ ...step, id: idx + 1 }));

      const handleEditorSave = (editedDataUrl) => {
        if (editorState.type === 'cover') {
           setFormData({ ...formData, coverImage: editedDataUrl });
        } else if (editorState.type === 'step') {
           updatePrepStep(editorState.stepId, 'image', editedDataUrl);
        }
        setEditorState({ isOpen: false, src: null, type: null, stepId: null });
      };

      const addOven = () => {
        const newOvens = [...(formData.technical.ovens || []), { id: Date.now(), name: '', temp: '', time: '', vapor: 'Não' }];
        updateNested('technical', 'ovens', newOvens);
      };
      
      const removeOven = (id) => {
        const newOvens = (formData.technical.ovens || []).filter(o => o.id !== id);
        updateNested('technical', 'ovens', newOvens);
      };
      
      const updateOven = (id, field, value) => {
        const newOvens = (formData.technical.ovens || []).map(o => o.id === id ? { ...o, [field]: value } : o);
        updateNested('technical', 'ovens', newOvens);
      };

      const addRevision = () => {
          const newHistory = [...(formData.revisionHistory || []), { id: Date.now(), date: new Date().toLocaleDateString('pt-BR'), version: formData.version || 1, notes: '', editedBy: '', reviewedBy: '', approvedBy: '' }];
          setFormData({...formData, revisionHistory: newHistory});
      };

      const removeRevision = (id) => {
          setFormData({...formData, revisionHistory: (formData.revisionHistory || []).filter(r => r.id !== id)});
      };

      const updateRevision = (id, field, value) => {
          setFormData({...formData, revisionHistory: (formData.revisionHistory || []).map(r => r.id === id ? { ...r, [field]: value } : r)});
      };

      const filteredIngredients = customIngredients.filter(item => item.name.toLowerCase().includes(ingSearchTerm.toLowerCase()));

      const addIngredientToFormulation = (item) => {
         const factor = 100 / parseFloat(item.referencePortion || 100);
         const newItem = {
             id: Date.now(),
             ingId: item.id,
             name: item.name,
             qty: 0,
             base: {
                 kcal: parseFloat(item.kcal || 0) * factor,
                 carbs: parseFloat(item.carbs || 0) * factor,
                 totalSugars: parseFloat(item.totalSugars || 0) * factor,
                 addedSugars: parseFloat(item.addedSugars || 0) * factor,
                 proteins: parseFloat(item.proteins || 0) * factor,
                 totalFats: parseFloat(item.totalFats || 0) * factor,
                 satFats: parseFloat(item.satFats || 0) * factor,
                 transFats: parseFloat(item.transFats || 0) * factor,
                 fiber: parseFloat(item.fiber || 0) * factor,
                 sodium: parseFloat(item.sodium || 0) * factor
             }
         };
         const newFormulation = [...(formData.formulation || []), newItem];
         recalcFormulation(newFormulation, formData.nutritional.finalYield, formData.nutritional.portion);
         setIngSearchModalOpen(false);
         setIngSearchTerm('');
      };

      const handleFormulationChange = (index, value) => {
        const newForm = [...formData.formulation];
        newForm[index].qty = value;
        recalcFormulation(newForm, formData.nutritional.finalYield, formData.nutritional.portion);
      };

      const removeFormulationItem = (index) => {
        const newForm = formData.formulation.filter((_, i) => i !== index);
        recalcFormulation(newForm, formData.nutritional.finalYield, formData.nutritional.portion);
      };

      const recalcFormulation = (form, yieldVal, portionVal) => {
        if (!form || form.length === 0) {
            setFormData(prev => ({ ...prev, formulation: form }));
            return;
        }
        const sumWeight = form.reduce((sum, item) => sum + Number(item.qty || 0), 0);
        const y = parseFloat(yieldVal) || sumWeight;
        const p = parseFloat(portionVal) || 0;
        const factor = y > 0 ? (p / y) : 0;

        const totals = form.reduce((acc, item) => {
           const itemFactor = Number(item.qty || 0) / 100;
           acc.kcal += (item.base.kcal || 0) * itemFactor;
           acc.carbs += (item.base.carbs || 0) * itemFactor;
           acc.totalSugars += (item.base.totalSugars || 0) * itemFactor;
           acc.addedSugars += (item.base.addedSugars || 0) * itemFactor;
           acc.proteins += (item.base.proteins || 0) * itemFactor;
           acc.totalFats += (item.base.totalFats || 0) * itemFactor;
           acc.satFats += (item.base.satFats || 0) * itemFactor;
           acc.transFats += (item.base.transFats || 0) * itemFactor;
           acc.fiber += (item.base.fiber || 0) * itemFactor;
           acc.sodium += (item.base.sodium || 0) * itemFactor;
           return acc;
        }, { kcal:0, carbs:0, totalSugars:0, addedSugars:0, proteins:0, totalFats:0, satFats:0, transFats:0, fiber:0, sodium:0 });

        setFormData(prev => ({
           ...prev,
           formulation: form,
           nutritional: {
              ...prev.nutritional,
              finalYield: yieldVal,
              portion: portionVal,
              kcal: (totals.kcal * factor).toFixed(1),
              carbs: (totals.carbs * factor).toFixed(1),
              totalSugars: (totals.totalSugars * factor).toFixed(1),
              addedSugars: (totals.addedSugars * factor).toFixed(1),
              proteins: (totals.proteins * factor).toFixed(1),
              totalFats: (totals.totalFats * factor).toFixed(1),
              satFats: (totals.satFats * factor).toFixed(1),
              transFats: (totals.transFats * factor).toFixed(1),
              fiber: (totals.fiber * factor).toFixed(1),
              sodium: (totals.sodium * factor).toFixed(1)
           }
        }));
      };

      return (
        <div className="max-w-6xl mx-auto bg-white rounded-xl shadow border border-gray-200 flex flex-col h-full relative">
          
          {editorState.isOpen && (
             <ImageEditorModal src={editorState.src} onSave={handleEditorSave} onCancel={() => setEditorState({ isOpen: false, src: null, type: null, stepId: null })} />
          )}

          {showConfirmModal && (
            <div className="absolute inset-0 bg-black/60 z-[60] flex items-center justify-center p-4">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm flex flex-col overflow-hidden">
                <div className="p-6 text-center space-y-4">
                  <div className="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto shadow-inner"><Save size={32} /></div>
                  <h3 className="text-xl font-bold text-[#5c3a21]">Salvar Ficha Técnica?</h3>
                  <p className="text-sm text-gray-500">Tem certeza que deseja salvar as alterações?</p>
                </div>
                <div className="bg-gray-50 p-4 flex justify-end space-x-3 border-t border-gray-200">
                  <button onClick={() => setShowConfirmModal(false)} className="px-4 py-2 text-gray-600 font-bold hover:bg-gray-200 rounded">Cancelar</button>
                  <button onClick={() => { setShowConfirmModal(false); onSave(formData); }} className="bg-[#5c3a21] hover:bg-[#4a2e1a] text-white px-6 py-2 rounded shadow font-bold">Confirmar</button>
                </div>
              </div>
            </div>
          )}

          {ingSearchModalOpen && (
            <div className="absolute inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[80%] flex flex-col overflow-hidden">
                <div className="bg-[#5c3a21] text-white p-4 flex justify-between items-center">
                  <h3 className="font-bold flex items-center"><Package className="mr-2" size={18}/> Buscar Ingrediente Próprio</h3>
                  <button onClick={() => setIngSearchModalOpen(false)} className="hover:text-[#F4B400]"><X size={20}/></button>
                </div>
                <div className="p-4 border-b border-gray-200 bg-gray-50">
                  <div className="relative">
                    <Search className="absolute left-3 top-2.5 text-gray-400" size={18} />
                    <input type="text" placeholder="Pesquisar por nome..." value={ingSearchTerm} onChange={(e) => setIngSearchTerm(e.target.value)} className="w-full pl-10 pr-4 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-[#F4B400] outline-none shadow-sm" />
                  </div>
                </div>
                <div className="flex-1 overflow-y-auto p-4 space-y-2 bg-gray-50">
                  {filteredIngredients.length === 0 ? (
                    <div className="text-center py-10 text-gray-500">Nenhum ingrediente encontrado.<br/><span className="text-xs">Cadastre novos ingredientes na aba "Meus Ingredientes".</span></div>
                  ) : (
                    filteredIngredients.map(item => (
                      <div key={item.id} className="bg-white p-3 rounded border border-gray-200 flex justify-between items-center shadow-sm">
                        <div>
                          <h4 className="font-bold text-[#5c3a21] text-sm">{item.name}</h4>
                          {item.supplier && <p className="text-xs text-gray-500">{item.supplier}</p>}
                        </div>
                        <button onClick={() => addIngredientToFormulation(item)} className="bg-[#F4B400] hover:bg-[#d9a000] text-[#5c3a21] px-4 py-2 rounded text-xs font-bold shadow-sm transition">Selecionar</button>
                      </div>
                    ))
                  )}
                </div>
              </div>
            </div>
          )}

          <div className="bg-white border-b border-gray-200 p-4 flex justify-between items-center">
            <button onClick={onBack} className="flex items-center space-x-2 text-gray-500 hover:text-[#5c3a21] font-medium"><ArrowLeft size={18} /> <span>Voltar</span></button>
            <div className="font-black text-[#5c3a21] text-lg uppercase">{formData.id ? 'Edição de Ficha Técnica' : 'Nova Ficha Técnica'}</div>
            <button onClick={() => setShowConfirmModal(true)} className="bg-[#5c3a21] text-white px-6 py-2 rounded shadow font-bold flex items-center space-x-2"><Save size={18} /> <span>Salvar Ficha</span></button>
          </div>

          <div className="flex border-b border-gray-200 overflow-x-auto bg-gray-50 px-2 scrollbar-hide">
            {tabs.map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`px-5 py-3 text-sm font-bold border-b-2 ${activeTab === tab.id ? 'border-[#F4B400] text-[#5c3a21] bg-white' : 'border-transparent text-gray-500 hover:text-[#5c3a21]'}`}>{tab.id}. {tab.label}</button>
            ))}
          </div>

          <div className="flex-1 p-6 overflow-y-auto bg-white">
            {activeTab === 1 && (
              <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div className="md:col-span-2 space-y-5">
                  <div className="grid grid-cols-2 gap-4">
                    <InputGroup label="Nome do Produto" value={formData.name} onChange={v => setFormData({...formData, name: v})} />
                    <InputGroup label="Código Interno" value={formData.code} onChange={v => setFormData({...formData, code: v})} />
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <InputGroup label="Categoria" value={formData.category} onChange={v => setFormData({...formData, category: v})} />
                    <InputGroup label="Marca" value={formData.general.brand} onChange={v => updateNested('general', 'brand', v)} />

                    <label className="text-xs font-bold text-gray-700 uppercase">Descrição Comercial</label>

                    <label className="bg-gray-200 text-gray-700 px-3 py-2 rounded text-sm font-bold cursor-pointer hover:bg-gray-300 flex items-center shrink-0">
                      <Upload size={16} className="mr-1"/> Local
                      <input type="file" accept="image/*" className="hidden" onChange={handleCoverImageUpload}/>
                    </label>
                  </div>
                  <div className="border-2 border-dashed border-gray-300 rounded-lg h-56 flex flex-col items-center justify-center bg-gray-50 relative overflow-hidden group">
                    {formData.coverImage ? (
                      <>
                        <img src={formData.coverImage} className="absolute inset-0 w-full h-full object-cover" />
                        <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col items-center justify-center gap-3 rounded-lg">
                          <button className="bg-[#F4B400] text-[#5c3a21] px-4 py-2 rounded text-xs font-bold shadow hover:bg-[#d9a000] flex items-center" onClick={() => handleEditExistingImage('cover', formData.coverImage)}><Edit size={16} className="mr-2"/> Editar Foto</button>
                          <button className="bg-white text-red-600 px-4 py-2 rounded text-xs font-bold shadow hover:bg-gray-100 flex items-center" onClick={() => setFormData({...formData, coverImage: ''})}><Trash2 size={16} className="mr-2"/> Remover Foto</button>
                        </div>
                      </>
                    ) : (
                      <div className="text-center text-gray-400 text-sm">
                        <ImageIcon size={32} className="mx-auto mb-2" />
                        Sem Imagem
                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}
            {activeTab === 2 && (
              <div className="space-y-6">
                <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                  <InputGroup label="Unidades por Pacote" type="number" value={formData.technical.unitsPerPackage} onChange={v => updateNested('technical', 'unitsPerPackage', v)} />
                  <InputGroup label="Peso do Pacote" value={formData.technical.packageWeight} onChange={v => updateNested('technical', 'packageWeight', v)} />
                  <InputGroup label="Peso por Unidade" value={formData.technical.unitWeight} onChange={v => updateNested('technical', 'unitWeight', v)} />
                  <InputGroup label="Quantidade por Tela" type="number" value={formData.technical.perTray} onChange={v => updateNested('technical', 'perTray', v)} />
                </div>
                
                <div className="bg-gray-50 border border-gray-200 rounded-xl p-5">
                  <div className="flex justify-between items-center border-b border-gray-200 pb-3 mb-4">
                     <h4 className="font-bold text-[#5c3a21] flex items-center">Parâmetros de Assamento (Fornos)</h4>
                     <button onClick={addOven} className="bg-[#5c3a21] text-white px-3 py-1.5 rounded text-xs font-bold flex items-center space-x-1 hover:bg-[#4a2e1a]"><Plus size={14}/> <span>Adicionar Forno</span></button>
                  </div>
                  
                  <div className="space-y-3">
                    {(!formData.technical.ovens || formData.technical.ovens.length === 0) ? (
                       <p className="text-xs text-gray-500 italic text-center py-4 bg-white rounded border border-dashed border-gray-300">Nenhum forno cadastrado. Adicione fornos específicos para este produto.</p>
                    ) : (
                       formData.technical.ovens.map((oven, idx) => (
                          <div key={oven.id} className="flex items-center gap-3 bg-white p-3 rounded border border-gray-200 shadow-sm relative">
                             <button onClick={() => removeOven(oven.id)} className="absolute -top-2 -right-2 bg-red-100 text-red-600 rounded-full p-1 hover:bg-red-200"><X size={12}/></button>
                             <div className="flex-1"><InputGroup label="Tipo/Nome do Forno" value={oven.name} onChange={v => updateOven(oven.id, 'name', v)} placeholder="Ex: Forno Lastro" /></div>
                             <div className="w-24"><InputGroup label="Temp." value={oven.temp} onChange={v => updateOven(oven.id, 'temp', v)} placeholder="Ex: 200°C" /></div>
                             <div className="w-24"><InputGroup label="Tempo" value={oven.time} onChange={v => updateOven(oven.id, 'time', v)} placeholder="Ex: 15 min" /></div>
                             <div className="flex flex-col space-y-1 w-20">
                                <label className="text-[11px] font-bold text-gray-600 uppercase tracking-wide">Vapor</label>
                                <select className="p-2 border border-gray-300 rounded outline-none text-sm text-gray-800 focus:ring-1 focus:ring-[#F4B400] transition" value={oven.vapor} onChange={e => updateOven(oven.id, 'vapor', e.target.value)}>
                                  <option>Sim</option><option>Não</option>
                                </select>
                             </div>
                          </div>
                       ))
                    )}
                  </div>
                </div>
              </div>
            )}
            {activeTab === 3 && (
              <div className="space-y-6">
                <textarea rows="6" className="w-full p-3 border border-gray-300 rounded outline-none text-sm" value={formData.ingredients.text} onChange={e => updateNested('ingredients', 'text', e.target.value)} placeholder="Ingredientes..." />
                <div className="bg-gray-50 p-4 rounded border grid grid-cols-2 gap-4">
                   <label className="flex items-center space-x-2 font-bold text-sm"><input type="checkbox" checked={formData.ingredients.containsGluten} onChange={e => updateNested('ingredients', 'containsGluten', e.target.checked)} /> <span>Contém Glúten</span></label>
                   <label className="flex items-center space-x-2 font-bold text-sm"><input type="checkbox" checked={formData.ingredients.containsLactose} onChange={e => updateNested('ingredients', 'containsLactose', e.target.checked)} /> <span>Contém Lactose</span></label>
                   <div className="col-span-2"><InputGroup label="Alérgicos" placeholder="Ex: CONTÉM DERIVADOS DE TRIGO..." value={formData.ingredients.allergensText} onChange={v => updateNested('ingredients', 'allergensText', v)} /></div>
                </div>
              </div>
            )}
            {activeTab === 4 && (
              <div className="grid grid-cols-2 gap-6">
                <InputGroup label="Validade do Pacote Original" value={formData.validity.package} onChange={v => updateNested('validity', 'package', v)} />
                <InputGroup label="Validade Após Assamento" value={formData.validity.postBaking} onChange={v => updateNested('validity', 'postBaking', v)} />
                <InputGroup label="Freezer" value={formData.conservation.frozen} onChange={v => updateNested('conservation', 'frozen', v)} />
                <InputGroup label="Embalagem Fechada" value={formData.conservation.closedPackage} onChange={v => updateNested('conservation', 'closedPackage', v)} />
              </div>
            )}
            {activeTab === 6 && (
              <div className="space-y-4">
                <button onClick={addPrepStep} className="bg-[#5c3a21] text-white px-3 py-1.5 rounded text-sm font-bold flex items-center space-x-1 mb-4"><Plus size={16}/> <span>Adicionar Etapa</span></button>
                <div className="grid grid-cols-2 gap-4">
                  {formData.preparationSteps.map((step, index) => (
                    <div 
                        key={step.id} 
                        className={`border p-3 relative bg-gray-50 flex shadow-sm rounded transition-all duration-200 ${draggedStepIndex === index ? 'opacity-40 scale-95 border-[#F4B400]' : ''}`}
                        draggable
                        onDragStart={() => handleDragStart(index)}
                        onDragOver={(e) => handleDragOver(e, index)}
                        onDrop={() => handleDrop(index)}
                    >
                      
                      <div className="absolute top-2 left-2 text-gray-400 hover:text-[#5c3a21] cursor-grab active:cursor-grabbing z-10" title="Arraste para reordenar">
                          <GripVertical size={18} />
                      </div>

                      <button onClick={() => removePrepStep(step.id)} className="absolute top-2 right-2 text-red-500 z-10 bg-white rounded-full p-1 shadow-sm hover:bg-red-50"><Trash2 size={16}/></button>
                      
                      <div className="w-28 h-20 bg-white border border-dashed flex-shrink-0 relative flex items-center justify-center ml-6 mr-3 rounded overflow-hidden group">
                        {step.image ? (
                          <>
                            <img src={step.image} className="w-full h-full object-cover"/>
                            <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex items-center justify-center gap-1.5 transition-opacity">
                              <button onClick={() => handleEditExistingImage('step', step.image, step.id)} title="Editar Foto" className="bg-[#F4B400] text-[#5c3a21] p-1.5 rounded shadow hover:bg-[#d9a000]"><Edit size={14}/></button>
                              <label title="Trocar Foto" className="cursor-pointer bg-white text-gray-700 p-1.5 rounded shadow hover:bg-gray-100">

                            </div>

                        ) : (
                          <label className="cursor-pointer text-[10px] uppercase font-bold text-gray-400 hover:text-[#F4B400] text-center w-full h-full flex flex-col items-center justify-center">

                      <div className="flex-1 flex flex-col">

            {activeTab === 7 && (

                   <div className="flex justify-between items-center border-b border-yellow-200 pb-3 mb-4">

                   <div className="space-y-2 mb-4">

                   </div>

                   <div className="grid grid-cols-2 gap-4 mt-4 bg-white p-3 rounded border border-gray-200 shadow-sm">
                      <InputGroup label="Rendimento Final da Receita (g)" type="number" value={formData.nutritional.finalYield || ''} onChange={v => { updateNested('nutritional', 'finalYield', v); recalcFormulation(formData.formulation, v, formData.nutritional.portion); }} placeholder="Vazio = Soma dos ingredientes" />
                      <InputGroup label="Porção Analisada (g)" type="number" value={formData.nutritional.portion} onChange={v => { updateNested('nutritional', 'portion', v); recalcFormulation(formData.formulation, formData.nutritional.finalYield, v); }} />
                      <div className="col-span-2"><InputGroup label="Medida Caseira" value={formData.nutritional.measure} onChange={v => updateNested('nutritional', 'measure', v)} placeholder="Ex: 1 Unidade" /></div>
                   </div>
                </div>

                <h4 className="font-bold text-[#5c3a21] border-b pb-2">Tabela Nutricional {formData.formulation && formData.formulation.length > 0 ? '(Calculada Automaticamente)' : '(Entrada Manual)'}</h4>
                <table className="w-full text-sm border shadow-sm">
                  <thead className="bg-[#5c3a21] text-white"><tr><th className="p-2">Nutriente</th><th className="p-2">Qtd. na Porção</th><th className="p-2 text-center">% VD</th></tr></thead>
                  <tbody>
                    <NutriRow label="Kcal" val={formData.nutritional.kcal} onChange={v => updateNested('nutritional', 'kcal', v)} refVD={2000} />
                    <NutriRow label="Carboidratos (g)" val={formData.nutritional.carbs} onChange={v => updateNested('nutritional', 'carbs', v)} refVD={300} />
                    <NutriRow label="Açúcares Totais (g)" val={formData.nutritional.totalSugars} onChange={v => updateNested('nutritional', 'totalSugars', v)} refVD={0} />
                    <NutriRow label="Açúcares Adicionados (g)" val={formData.nutritional.addedSugars} onChange={v => updateNested('nutritional', 'addedSugars', v)} refVD={50} />
                    <NutriRow label="Proteínas (g)" val={formData.nutritional.proteins} onChange={v => updateNested('nutritional', 'proteins', v)} refVD={50} />
                    <NutriRow label="Gorduras Totais (g)" val={formData.nutritional.totalFats} onChange={v => updateNested('nutritional', 'totalFats', v)} refVD={55} />
                    <NutriRow label="Gorduras Saturadas (g)" val={formData.nutritional.satFats} onChange={v => updateNested('nutritional', 'satFats', v)} refVD={22} />
                    <NutriRow label="Gorduras Trans (g)" val={formData.nutritional.transFats} onChange={v => updateNested('nutritional', 'transFats', v)} refVD={0} />
                    <NutriRow label="Fibra Alimentar (g)" val={formData.nutritional.fiber} onChange={v => updateNested('nutritional', 'fiber', v)} refVD={25} />
                    <NutriRow label="Sódio (mg)" val={formData.nutritional.sodium} onChange={v => updateNested('nutritional', 'sodium', v)} refVD={2000} />
                  </tbody>
                </table>
              </div>
            )}
            {activeTab === 8 && (
              <div className="space-y-8">
                <div className="bg-gray-50 border border-gray-200 rounded-xl p-5">
                    <div className="flex justify-between items-center border-b border-gray-200 pb-3 mb-4">
                        <h4 className="font-bold text-[#5c3a21] flex items-center"><FileText className="mr-2" size={18}/> Histórico de Revisões</h4>
                        <button onClick={addRevision} className="bg-[#5c3a21] text-white px-3 py-1.5 rounded text-xs font-bold flex items-center space-x-1 hover:bg-[#4a2e1a]"><Plus size={14}/> <span>Nova Revisão</span></button>
                    </div>
                    <div className="space-y-3">
                        {(!formData.revisionHistory || formData.revisionHistory.length === 0) ? (
                            <p className="text-xs text-gray-500 italic text-center py-4 bg-white rounded border border-dashed border-gray-300">Nenhum histórico registrado.</p>
                        ) : (
                            <table className="w-full text-sm bg-white rounded border shadow-sm">
                                <thead className="bg-[#5c3a21] text-white">
                                    <tr>
                                        <th className="p-2 text-left w-28">Data / Versão</th>
                                        <th className="p-2 text-left">Motivo da Alteração</th>
                                        <th className="p-2 text-left w-48">Responsáveis</th>
                                        <th className="p-2 w-10"></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {formData.revisionHistory.map(rev => (
                                        <tr key={rev.id} className="border-b border-gray-100 hover:bg-gray-50 align-top">
                                            <td className="p-2 space-y-2">
                                                <input type="text" value={rev.date} onChange={e => updateRevision(rev.id, 'date', e.target.value)} className="w-full p-1.5 border border-gray-300 rounded outline-none focus:ring-1 focus:ring-[#F4B400] text-sm" placeholder="DD/MM/AAAA" />
                                                <div className="flex items-center space-x-1"><span className="text-xs font-bold text-gray-500">v</span><input type="number" value={rev.version} onChange={e => updateRevision(rev.id, 'version', e.target.value)} className="w-full p-1.5 border border-gray-300 rounded outline-none focus:ring-1 focus:ring-[#F4B400] text-sm" /></div>
                                            </td>
                                            <td className="p-2">
                                                <textarea value={rev.notes} onChange={e => updateRevision(rev.id, 'notes', e.target.value)} className="w-full h-full min-h-[80px] p-2 border border-gray-300 rounded outline-none focus:ring-1 focus:ring-[#F4B400] text-sm resize-none" placeholder="Ex: Redução de sal na formulação." />
                                            </td>
                                            <td className="p-2 space-y-2">
                                                <input type="text" value={rev.editedBy || ''} onChange={e => updateRevision(rev.id, 'editedBy', e.target.value)} className="w-full p-1.5 border border-gray-300 rounded outline-none focus:ring-1 focus:ring-[#F4B400] text-xs" placeholder="Elaborado por..." />
                                                <input type="text" value={rev.reviewedBy || ''} onChange={e => updateRevision(rev.id, 'reviewedBy', e.target.value)} className="w-full p-1.5 border border-gray-300 rounded outline-none focus:ring-1 focus:ring-[#F4B400] text-xs" placeholder="Revisado por..." />
                                                <input type="text" value={rev.approvedBy || ''} onChange={e => updateRevision(rev.id, 'approvedBy', e.target.value)} className="w-full p-1.5 border border-gray-300 rounded outline-none focus:ring-1 focus:ring-[#F4B400] text-xs" placeholder="Aprovado por..." />
                                            </td>
                                            <td className="p-2 text-center pt-3"><button onClick={() => removeRevision(rev.id)} className="text-red-500 hover:bg-red-50 p-1.5 rounded transition"><Trash2 size={16}/></button></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        )}
                    </div>
                </div>

                <div className="bg-gray-50 border border-gray-200 rounded-xl p-5">
                    <div className="flex justify-between items-center border-b border-gray-200 pb-3 mb-4">
                        <h4 className="font-bold text-[#5c3a21] flex items-center"><CheckCircle className="mr-2" size={18}/> Controle de Aprovação e Assinaturas</h4>
                        <label className="flex items-center space-x-2 font-bold text-sm bg-white px-3 py-1.5 rounded border border-gray-300 shadow-sm cursor-pointer hover:bg-gray-100 transition">
                            <input type="checkbox" checked={formData.approval?.show || false} onChange={e => updateNested('approval', 'show', e.target.checked)} className="accent-[#F4B400] w-4 h-4" />
                            <span>Exibir no PDF</span>
                        </label>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <InputGroup label="Elaborado por (Nome/Cargo)" value={formData.approval?.createdBy || ''} onChange={v => updateNested('approval', 'createdBy', v)} placeholder="Ex: Ana - Qualidade" />
                        <InputGroup label="Revisado por (Nome/Cargo)" value={formData.approval?.reviewedBy || ''} onChange={v => updateNested('approval', 'reviewedBy', v)} placeholder="Ex: Bruno - P&D" />
                        <InputGroup label="Aprovado por (Nome/Cargo)" value={formData.approval?.approvedBy || ''} onChange={v => updateNested('approval', 'approvedBy', v)} placeholder="Ex: Carlos - Diretor" />
                    </div>
                    <p className="text-[11px] text-gray-500 mt-4 italic">* A data e hora de emissão será gerada automaticamente no momento da visualização/impressão do PDF.</p>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    const InputGroup = ({ label, type = "text", value, onChange, placeholder }) => (
      <div className="flex flex-col space-y-1">
        <label className="text-[11px] font-bold text-gray-600 uppercase tracking-wide">{label}</label>
        <input type={type} value={value} placeholder={placeholder} onChange={e => onChange(e.target.value)} className="p-2 border border-gray-300 rounded outline-none text-sm text-gray-800 focus:ring-1 focus:ring-[#F4B400] transition" />
      </div>
    );

    const NutriRow = ({ label, val, onChange, refVD }) => (
      <tr className="border-b border-gray-100 bg-white hover:bg-gray-50">
        <td className="p-2">{label}</td>
        <td className="p-2 w-32"><input type="number" value={val} onChange={e => onChange(e.target.value)} className="w-full p-1.5 border border-gray-300 rounded outline-none focus:ring-1 focus:ring-[#F4B400]" /></td>
        <td className="p-2 font-bold text-gray-500 w-24 text-center bg-gray-50">{refVD > 0 ? Math.round((parseFloat(val || 0) / refVD) * 100) : (refVD === 0 && label.includes('Totais') ? '-' : 0)}{label.includes('Totais') && refVD === 0 ? '' : '%'}</td>
      </tr>
    );

    const PDFView = ({ ficha, onBack, companySettings }) => {
      if (!ficha) return null;
      return (
        <div className="w-full flex flex-col items-center pb-20">
          <div className="no-print w-full max-w-[210mm] bg-white p-4 rounded-xl shadow border mb-6 flex justify-between items-center sticky top-4 z-50">
            <button onClick={onBack} className="flex items-center space-x-2 text-sm"><ArrowLeft size={16} /> <span>Voltar à Edição</span></button>
            <button onClick={() => window.print()} className="bg-[#5c3a21] text-[#F4B400] px-6 py-2 rounded font-black uppercase text-sm flex items-center space-x-2"><Printer size={18} /> <span>Imprimir A4</span></button>
          </div>
          <div className="pdf-container shadow-2xl relative bg-white">
            <header className="flex justify-between items-end border-b-4 border-[#F4B400] pb-4 mb-6 avoid-break">
              <div className="flex items-center space-x-4">
                 <div className="relative flex items-center mr-2">{(companySettings.fichaLogo || companySettings.logo) ? <img src={companySettings.fichaLogo || companySettings.logo} className="h-16 max-w-[200px] object-contain" /> : <ImacLogoSVG className="h-16" />}</div>
                 <div className="pl-4 border-l-2 border-gray-300"><p className="text-xs uppercase font-black text-gray-700 tracking-wider">Indústria de Massas Congeladas</p><p className="font-bold text-lg text-black">Controle de Qualidade</p></div>
              </div>
              <div className="text-right"><h1 className="text-[22px] font-black text-black uppercase tracking-widest border-b-2 border-black inline-block mb-1">Ficha Técnica</h1><h2 className="text-2xl font-black text-[#5c3a21] mt-1">{ficha.name}</h2></div>
            </header>
            
            <div className="block mb-4">
              <div className="grid grid-cols-[1fr_1.4fr] gap-8 mb-6">
                <div className="space-y-5">
                  <div className="border-[6px] border-[#F4B400] rounded-lg overflow-hidden h-52 w-full avoid-break"><img src={ficha.coverImage} className="w-full h-full object-cover" /></div>
                  <div className="bg-white rounded border border-gray-200 p-4 text-[13px] space-y-3 shadow-sm text-gray-800 leading-snug avoid-break">
                    <p><span className="font-bold text-black">Unidades por Pacote:</span><br/> Média de {ficha.technical.unitsPerPackage} unidades.</p>
                    <p><span className="font-bold text-black">Peso do Pacote:</span> {ficha.technical.packageWeight}</p>
                    <p><span className="font-bold text-black">Quantidade por tela:</span> {ficha.technical.perTray} unidades.</p>
                    
                    <div className="border-t border-gray-200 pt-2 mt-2">
                      <span className="font-bold text-black block mb-1">Parâmetros de Assamento:</span>
                      {(!ficha.technical.ovens || ficha.technical.ovens.length === 0) ? (
                          <p className="text-gray-500 italic text-[11px]">Não informado</p>
                      ) : (
                          <div className="space-y-1.5">
                          {ficha.technical.ovens.map((oven, i) => (
                              <div key={i} className="bg-gray-50 p-1.5 rounded border border-gray-200 text-[11px] leading-tight">
                                  <span className="font-bold text-[#5c3a21]">{oven.name}:</span> {oven.temp} | {oven.time} | Vapor: {oven.vapor}
                              </div>
                          ))}
                          </div>
                      )}
                    </div>
                  </div>
                  <div className="avoid-break"><h3 className="font-black text-black bg-[#F4B400] px-3 py-1.5 text-center text-xs uppercase rounded-t border-b-2 border-[#5c3a21]">Armazenamento</h3><div className="border border-black bg-white text-[10px]"><div className="grid grid-cols-3 text-center font-bold border-b border-black divide-x divide-black bg-gray-100"><div className="p-1">MODO</div><div className="p-1">FECHADA</div><div className="p-1">ABERTA</div></div><div className="grid grid-cols-3 text-center divide-x divide-black items-center"><div className="p-2 font-bold bg-gray-50">Freezer<br/>({ficha.conservation.frozen})</div><div className="p-2">{ficha.conservation.closedPackage}</div><div className="p-2">{ficha.conservation.openPackage}</div></div></div></div>
                  <div className="grid grid-cols-2 gap-2 text-center text-xs avoid-break"><div className="border border-gray-300 rounded overflow-hidden"><div className="bg-[#5c3a21] text-white font-bold p-1">Validade Pacote</div><div className="p-2 bg-gray-50">{ficha.validity.package}</div></div><div className="border border-gray-300 rounded overflow-hidden flex flex-col"><div className="bg-[#5c3a21] text-white font-bold p-1">Validade Assado</div><div className="p-2 bg-gray-50 flex-1 flex items-center justify-center font-bold">{ficha.validity.postBaking}</div></div></div>
                </div>
                <div className="space-y-6">
                  <section className="avoid-break"><h3 className="text-lg font-black text-[#5c3a21] border-b border-black pb-1 mb-2">Ingredientes</h3><p className="text-[13px] text-justify leading-snug">{ficha.ingredients.text}</p><p className="mt-2 text-[12px] font-black uppercase leading-tight bg-gray-100 p-2 rounded">{ficha.ingredients.containsGluten ? 'CONTÉM GLÚTEN. ' : 'NÃO CONTÉM GLÚTEN. '}{ficha.ingredients.containsLactose ? 'CONTÉM LACTOSE. ' : 'NÃO CONTÉM LACTOSE. '}{ficha.ingredients.allergensText && `ALÉRGICOS: ${ficha.ingredients.allergensText}`}</p></section>
                  <section className="avoid-break"><h3 className="text-lg font-black text-[#5c3a21] border-b border-black pb-1 mb-2">Informação Nutricional</h3><div className="border-[3px] border-black p-1.5 w-full max-w-[85%] font-sans text-black"><table className="w-full text-[12px]"><thead><tr className="border-b-[4px] border-black"><th colSpan="3" className="text-lg font-black pt-0 pb-1">INFORMAÇÃO NUTRICIONAL</th></tr><tr className="border-b-[2px] border-black"><th colSpan="3" className="font-normal text-left py-1 text-[11px] leading-tight"><span className="font-bold">Porção: {ficha.nutritional.portion}g ({ficha.nutritional.measure})</span></th></tr><tr className="border-b border-black font-black text-right"><td className="py-1 text-left"></td><td className="py-1 w-16">100 g</td><td className="py-1 w-16">% VD*</td></tr></thead><tbody>
                    <NutriPrintRow label="Valor energético (kcal)" val={ficha.nutritional.kcal} vd={Math.round((ficha.nutritional.kcal / 2000) * 100)} />
                    <NutriPrintRow label="Carboidratos (g)" val={ficha.nutritional.carbs} vd={Math.round((ficha.nutritional.carbs / 300) * 100)} />
                    <NutriPrintRow label="Açúcares totais (g)" val={ficha.nutritional.totalSugars} vd="-" />
                    <NutriPrintRow label="Açúcares adicionados (g)" val={ficha.nutritional.addedSugars} vd={Math.round((ficha.nutritional.addedSugars / 50) * 100)} />
                    <NutriPrintRow label="Proteínas (g)" val={ficha.nutritional.proteins} vd={Math.round((ficha.nutritional.proteins / 50) * 100)} />
                    <NutriPrintRow label="Gorduras totais (g)" val={ficha.nutritional.totalFats} vd={Math.round((ficha.nutritional.totalFats / 55) * 100)} />
                    <NutriPrintRow label="Gorduras saturadas (g)" val={ficha.nutritional.satFats} vd={Math.round((ficha.nutritional.satFats / 22) * 100)} />
                    <NutriPrintRow label="Gorduras trans (g)" val={ficha.nutritional.transFats} vd={ficha.nutritional.transFats > 0 ? '**' : '0'} />
                    <NutriPrintRow label="Fibra alimentar (g)" val={ficha.nutritional.fiber} vd={Math.round((ficha.nutritional.fiber / 25) * 100)} />
                    <NutriPrintRow label="Sódio (mg)" val={ficha.nutritional.sodium} vd={Math.round((ficha.nutritional.sodium / 2000) * 100)} borderBottom={false} />
                  </tbody></table></div><p className="text-[9px] mt-1 text-black">*Percentual de valores diários fornecidos pela porção.</p></section>
                </div>
              </div>
              
              {ficha.preparationSteps && ficha.preparationSteps.length > 0 && (
                <section className="mt-6 pt-2">
                  <h3 className="text-lg font-black text-[#5c3a21] border-b border-black pb-1 mb-3 avoid-break">Modo de Preparo</h3>
                  <div className="grid grid-cols-2 gap-x-8 gap-y-4">
                    {ficha.preparationSteps.map((step, idx) => (
                      <div key={idx} className="relative avoid-break">
                        <div className="font-black text-[13px] text-[#5c3a21] mb-1 leading-none"><span className="text-[#F4B400] text-lg mr-1">•</span>{step.title}:</div>
                        {step.image && (<div className="w-full h-[140px] mb-1.5 bg-gray-100 rounded overflow-hidden border border-gray-200"><img src={step.image} className="w-full h-full object-cover" /></div>)}
                        <p className="text-[11px] text-justify leading-tight text-gray-800">{step.desc}</p>
                      </div>
                    ))}
                  </div>
                </section>
              )}

              {/* Histórico e Assinaturas (Se ativado) */}
              {(ficha.revisionHistory?.length > 0 || ficha.approval?.show) && (
                  <div className="mt-6 pt-2">
                      {ficha.revisionHistory?.length > 0 && (
                          <div className="mb-4">
                              <h3 className="text-[14px] font-black text-[#5c3a21] border-b border-black pb-1 mb-2 avoid-break">Histórico de Revisões</h3>
                              <table className="w-full text-[9px] border-collapse border border-black">
                                  <thead>
                                      <tr className="bg-gray-100">
                                          <th className="border border-black p-1 text-center w-14">Data</th>
                                          <th className="border border-black p-1 text-center w-8">Ver.</th>
                                          <th className="border border-black p-1 text-left">Motivos / Alterações</th>
                                          <th className="border border-black p-1 text-center w-[15%]">Elaborado por</th>
                                          <th className="border border-black p-1 text-center w-[15%]">Revisado por</th>
                                          <th className="border border-black p-1 text-center w-[15%]">Aprovado por</th>
                                      </tr>
                                  </thead>
                                  <tbody>
                                      {ficha.revisionHistory.map(rev => (
                                          <tr key={rev.id}>
                                              <td className="border border-black p-1 text-center">{rev.date}</td>
                                              <td className="border border-black p-1 text-center">v{rev.version}.0</td>
                                              <td className="border border-black p-1">{rev.notes}</td>
                                              <td className="border border-black p-1 text-center truncate max-w-[60px]">{rev.editedBy || '-'}</td>
                                              <td className="border border-black p-1 text-center truncate max-w-[60px]">{rev.reviewedBy || '-'}</td>
                                              <td className="border border-black p-1 text-center truncate max-w-[60px]">{rev.approvedBy || '-'}</td>
                                          </tr>
                                      ))}
                                  </tbody>
                              </table>
                          </div>
                      )}

                      {ficha.approval?.show && (
                          <div className="border border-black p-3 bg-white mt-4 relative avoid-break">
                              <div className="text-[10px] font-bold mb-6 flex justify-between">
                                  <span className="uppercase text-[#5c3a21]">Controle de Aprovação</span>
                                  <span>Emissão: {new Date().toLocaleString('pt-BR')}</span>
                              </div>
                              <div className="grid grid-cols-3 gap-6 text-center text-[10px]">
                                  <div>
                                      <div className="border-t border-black pt-1 mx-4 font-bold">{ficha.approval.createdBy || 'Elaborado por'}</div>
                                  </div>
                                  <div>
                                      <div className="border-t border-black pt-1 mx-4 font-bold">{ficha.approval.reviewedBy || 'Revisado por'}</div>
                                  </div>
                                  <div>
                                      <div className="border-t border-black pt-1 mx-4 font-bold">{ficha.approval.approvedBy || 'Aprovado por'}</div>
                                  </div>
                              </div>
                          </div>
                      )}
                  </div>
              )}

            </div>
            <footer className="mt-8 border-t-2 border-black pt-2 text-center text-[10px] text-black font-medium leading-tight avoid-break"><p className="font-black text-xs text-[#5c3a21]">{companySettings.name}</p><p>{companySettings.address} - Telefone: {companySettings.phone}</p></footer>
          </div>
        </div>
      );
    };

    const NutriPrintRow = ({ label, val, vd, borderBottom = true }) => (<tr className={borderBottom ? "border-b border-gray-400" : ""}><td className="py-0.5">{label}</td><td className="text-right py-0.5">{val}</td><td className="text-right py-0.5">{vd}</td></tr>);

    // Inicializa o App
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
